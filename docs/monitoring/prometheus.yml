global:
  scrape_interval: 20s
  evaluation_interval: 20s

scrape_configs:
  - job_name: 'chainlink'
    scrape_interval: 20s
    static_configs:
      - targets: ['chainlink:8443']
    scheme: https
    tls_config:
      insecure_skip_verify: true  # For self-signed certs in dev/local
    metrics_path: /q/metrics
