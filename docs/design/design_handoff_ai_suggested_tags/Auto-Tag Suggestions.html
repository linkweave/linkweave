<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chainlink — Add / Edit Bookmark</title>
<style>
.dark{
  --color-background:#14161a;--color-foreground:#ededed;--color-card:#1e2028;
  --color-primary:#3b82f6;--color-secondary:#252a32;--color-muted:#252a32;
  --color-muted-foreground:#a3a3a3;--color-popover:#22262f;--color-border:#363d49;
  --color-input:#252a32;--color-ring:#3b82f6;
  --ai:#a78bfa;--ai-strong:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:
    radial-gradient(1100px 520px at 78% -8%, color-mix(in oklab,var(--ai) 11%,transparent), transparent 60%),
    var(--color-background);
  color:var(--color-foreground);
  font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;
  display:grid;place-items:center;padding:30px 16px}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:transparent}
input,textarea{font:inherit}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

/* ── Modal ──────────────────────────────────────────────────── */
.modal{width:min(560px,100%);background:var(--color-card);border:1px solid var(--color-border);
  border-radius:14px;box-shadow:0 30px 90px rgba(0,0,0,.62);display:flex;flex-direction:column;
  max-height:calc(100vh - 60px);overflow:hidden;animation:pop .18s cubic-bezier(.2,.7,.3,1.05)}
@keyframes pop{from{opacity:0;transform:scale(.975) translateY(6px)}to{opacity:1;transform:none}}
.m-head{padding:16px 20px 14px;border-bottom:1px solid var(--color-border);display:flex;
  align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.m-head h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.m-head .sub{font-size:11.5px;color:var(--color-muted-foreground);margin-top:3px}
.icon-btn{width:28px;height:28px;border-radius:7px;color:var(--color-muted-foreground);display:grid;place-items:center}
.icon-btn:hover{background:var(--color-secondary);color:var(--color-foreground)}
.m-body{padding:18px 20px;overflow-y:auto;flex:1}
.m-foot{padding:13px 20px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;
  gap:9px;flex-shrink:0;align-items:center}

/* fields */
.field{margin-bottom:13px}
.flabel{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--color-muted-foreground);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.inp{width:100%;height:34px;padding:0 10px;background:var(--color-input);border:1px solid var(--color-border);
  border-radius:7px;color:var(--color-foreground);font-size:13px;outline:0}
textarea.inp{height:auto;padding:8px 10px;resize:vertical;min-height:58px;line-height:1.5}
.inp:focus{border-color:var(--color-ring);box-shadow:0 0 0 2px color-mix(in oklab,var(--color-ring) 18%,transparent)}
.row2{display:flex;gap:11px}.row2 .field{flex:1;margin-bottom:0}
.selwrap{position:relative}
.selwrap .chev{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--color-muted-foreground);pointer-events:none}
select.inp{cursor:pointer;appearance:none;padding-right:28px}

/* ── Tag combobox ───────────────────────────────────────────── */
.tagctl{position:relative}
.tagfield{min-height:38px;border:1px solid var(--color-border);background:var(--color-input);
  border-radius:8px;padding:5px 7px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;cursor:text;transition:.14s}
.tagfield:hover{border-color:color-mix(in oklab,var(--color-foreground) 22%,var(--color-border))}
.tagfield.open{border-color:var(--color-ring);box-shadow:0 0 0 2px color-mix(in oklab,var(--color-ring) 18%,transparent)}
.chip{display:inline-flex;align-items:center;gap:6px;height:25px;padding:0 4px 0 9px;border-radius:9999px;
  font-size:12px;font-weight:500;white-space:nowrap;border:1px solid color-mix(in oklab,var(--tag) 45%,var(--color-border));
  background:color-mix(in oklab,var(--tag) 14%,var(--color-secondary));color:var(--color-foreground);
  transition:transform .14s ease, opacity .14s}
.chip .dot{width:7px;height:7px;border-radius:2px;background:var(--tag);flex-shrink:0}
.chip .rm{display:inline-flex;color:var(--color-muted-foreground);border-radius:5px;padding:1px}
.chip .rm:hover{color:var(--color-foreground);background:color-mix(in oklab,var(--color-foreground) 14%,transparent)}
.chip.fold{animation:foldIn .34s cubic-bezier(.2,.9,.3,1.15) both}
@keyframes foldIn{0%{opacity:0;transform:translateY(-7px) scale(.85)}60%{opacity:1;transform:translateY(0) scale(1.05)}100%{transform:scale(1)}}
.tagfield .ph{color:var(--color-muted-foreground);font-size:12.5px;padding:3px 4px;display:inline-flex;align-items:center;gap:6px}
.tagfield .ph svg{opacity:.8}

/* picker dropdown (lifted from batch tag editor) */
.picker{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;border-radius:11px;
  border:1px solid var(--color-border);background:var(--color-popover);box-shadow:0 18px 50px rgba(0,0,0,.6);
  overflow:hidden;animation:pop .13s cubic-bezier(.2,.7,.3,1)}
.pick-head{padding:10px 11px 9px}
.pick-search{display:flex;align-items:center;gap:8px;height:32px;padding:0 10px;border-radius:8px;
  background:var(--color-input);border:1px solid var(--color-border)}
.pick-search svg{color:var(--color-muted-foreground);flex-shrink:0}
.pick-search input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:var(--color-foreground);font-size:12.5px}
.pick-list{max-height:218px;overflow-y:auto;padding:0 6px 7px}
.pick-row{display:flex;align-items:center;gap:9px;width:100%;height:33px;padding:0 8px;border-radius:7px;
  font-size:12.5px;text-align:left;color:var(--color-foreground)}
.pick-row:hover{background:var(--color-secondary)}
.pick-box{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--color-border);display:grid;
  place-items:center;color:#fff;flex-shrink:0;transition:.12s}
.pick-row.on .pick-box{background:var(--color-primary);border-color:var(--color-primary)}
.pick-row .pdot{width:9px;height:9px;border-radius:50%;background:var(--tag);flex-shrink:0}
.pick-row .pname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-row:not(.on) .pname{opacity:.72}
.pick-row .pcount{font-size:10.5px;color:var(--color-muted-foreground);font-variant-numeric:tabular-nums;flex-shrink:0}
.pick-create .plus{width:16px;height:16px;display:grid;place-items:center;color:var(--color-primary);flex-shrink:0}
.pick-create b{font-weight:600;color:#fff}
.pick-empty{padding:16px 10px;text-align:center;font-size:12px;color:var(--color-muted-foreground)}

/* ── Suggested tags ─────────────────────────────────────────── */
.sug{margin-top:16px;border:1px solid color-mix(in oklab,var(--ai) 22%,var(--color-border));border-radius:12px;
  background:color-mix(in oklab,var(--ai) 5%,var(--color-background));overflow:hidden}
.sug-head{display:flex;align-items:center;gap:10px;padding:11px 13px;
  border-bottom:1px solid color-mix(in oklab,var(--ai) 14%,var(--color-border))}
.sug-title{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;flex:1;min-width:0}
.sparkwrap{width:23px;height:23px;border-radius:7px;display:grid;place-items:center;flex-shrink:0;
  background:color-mix(in oklab,var(--ai) 20%,transparent);color:var(--ai)}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;
  border-radius:9999px;font-size:10.5px;font-weight:600;background:color-mix(in oklab,var(--ai) 22%,transparent);color:var(--ai)}
.privacy{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;
  color:var(--color-muted-foreground);padding:3px 8px;border-radius:9999px;background:var(--color-secondary);
  border:1px solid var(--color-border);white-space:nowrap}
.privacy svg{color:#22c55e}
.sug-body{padding:13px}
.grp+.grp{margin-top:14px}
.grp-lab{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:8px}
.grp-lab.ai{color:var(--ai)}
.grp-lab .regen{margin-left:auto;display:inline-flex;align-items:center;gap:5px;color:var(--color-muted-foreground);
  font-size:10px;letter-spacing:0;text-transform:none;font-weight:500;padding:2px 6px;border-radius:6px}
.grp-lab .regen:hover{color:var(--ai);background:color-mix(in oklab,var(--ai) 12%,transparent)}
.chiprow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-height:28px}

.sChip{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 5px 0 9px;border-radius:9999px;
  font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;user-select:none;
  border:1px solid var(--color-border);background:var(--color-secondary);color:var(--color-foreground);
  transition:background .14s,border-color .14s,opacity .14s,box-shadow .14s,transform .12s}
.sChip .src{display:inline-flex;align-items:center;color:var(--color-muted-foreground);flex-shrink:0}
.sChip .src.ai{color:var(--ai)}
.sChip .dot{width:7px;height:7px;border-radius:2px;background:var(--tag);flex-shrink:0}
.sChip .box{width:16px;height:16px;border-radius:5px;display:grid;place-items:center;flex-shrink:0;
  border:1.5px solid var(--color-border);color:transparent;transition:.14s;margin-left:1px}
.sChip.sel .box{background:var(--accent);border-color:var(--accent);color:#fff}
.sChip.sel{background:color-mix(in oklab,var(--accent) 12%,var(--color-secondary));
  border-color:color-mix(in oklab,var(--accent) 45%,var(--color-border))}
.sChip:not(.sel){opacity:.6}.sChip:not(.sel):hover{opacity:.92}
.sChip.sel:hover{background:color-mix(in oklab,var(--accent) 18%,var(--color-secondary))}
.sChip.ai{--accent:var(--ai-strong)}.sChip.rule{--accent:var(--color-primary)}

/* shimmer skeleton (outline) */
.skrow{display:flex;gap:7px;align-items:center}
.sk{height:28px;border-radius:9999px;position:relative;overflow:hidden;background:transparent;
  border:1px solid color-mix(in oklab,var(--ai) 30%,var(--color-border))}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,color-mix(in oklab,var(--ai) 26%,transparent),transparent);
  animation:shimmer 1.15s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
.sk .skdot{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:2px;
  background:color-mix(in oklab,var(--ai) 35%,var(--color-border))}

.helper{font-size:11.5px;color:var(--color-muted-foreground);margin-top:12px;line-height:1.5}
.ai-cta{display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 14px;border-radius:9px;font-size:12.5px;
  font-weight:600;color:var(--ai);background:color-mix(in oklab,var(--ai) 15%,transparent);
  border:1px solid color-mix(in oklab,var(--ai) 42%,var(--color-border));transition:.14s}
.ai-cta:hover{background:color-mix(in oklab,var(--ai) 24%,transparent)}
.ai-hint{font-size:11px;color:var(--color-muted-foreground);margin-top:8px;line-height:1.5}
.retrieve{margin-top:16px;display:inline-flex;align-items:center;gap:9px;height:38px;padding:0 15px;border-radius:11px;
  font-size:12.5px;font-weight:600;color:var(--ai);background:color-mix(in oklab,var(--ai) 7%,var(--color-background));
  border:1px solid color-mix(in oklab,var(--ai) 30%,var(--color-border));transition:.14s}
.retrieve:hover{background:color-mix(in oklab,var(--ai) 15%,transparent);border-color:color-mix(in oklab,var(--ai) 45%,var(--color-border))}
.retrieve .rmeta{font-weight:500;color:var(--color-muted-foreground);font-size:11px}
.empty{display:flex;align-items:center;gap:10px;padding:3px 1px;color:var(--color-muted-foreground);font-size:12.5px}
.empty .ico{width:27px;height:27px;border-radius:8px;background:var(--color-secondary);display:grid;place-items:center;flex-shrink:0;color:var(--ai)}
.sug-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 13px;
  border-top:1px solid color-mix(in oklab,var(--ai) 14%,var(--color-border))}
.btn-accept{display:inline-flex;align-items:center;gap:7px;height:31px;padding:0 14px;border-radius:8px;
  font-size:12.5px;font-weight:600;background:var(--ai-strong);color:#fff;transition:.14s}
.btn-accept:hover{filter:brightness(1.09)}
.btn-accept:disabled{opacity:.42;cursor:default;filter:none}
.btn-dismiss{height:31px;padding:0 12px;border-radius:8px;border:1px solid var(--color-border);
  color:var(--color-muted-foreground);font-size:12.5px;font-weight:500}
.btn-dismiss:hover{color:var(--color-foreground);background:var(--color-secondary)}

/* properties (collapsible) */
.psec-head{display:flex;align-items:center;gap:9px;margin-top:18px;cursor:pointer;user-select:none}
.psec-lab{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted-foreground);
  display:flex;align-items:center;gap:6px;flex-shrink:0;transition:color .14s}
.psec-head:hover .psec-lab{color:var(--color-foreground)}
.psec-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:9999px;font-size:10px;font-weight:500;
  background:var(--color-secondary);color:var(--color-muted-foreground);border:1px solid var(--color-border)}
.psec-line{flex:1;height:1px;background:var(--color-border)}
.psec-chev{color:var(--color-muted-foreground);display:inline-flex;transition:transform .2s}
.psec-chev.open{transform:rotate(180deg)}
.psec-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s ease,opacity .18s;opacity:0}
.psec-wrap.open{grid-template-rows:1fr;opacity:1;margin-top:13px}
.psec-inner{overflow:hidden}
.type-badge{font-size:9.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--color-muted-foreground);
  background:var(--color-secondary);border:1px solid var(--color-border);border-radius:4px;padding:1px 5px}

/* footer buttons */
.btn-sm{height:33px;padding:0 15px;border-radius:8px;font-size:13px;font-weight:500;
  border:1px solid var(--color-border);color:var(--color-foreground)}
.btn-sm:hover{background:var(--color-secondary)}
.btn-sm.pri{background:var(--color-primary);color:#fff;border-color:transparent}
.btn-sm.pri:hover{filter:brightness(1.08)}
.applied-flash{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#22c55e;margin-right:auto;font-weight:500;
  opacity:0;transform:translateX(-4px);transition:.2s}
.applied-flash.show{opacity:1;transform:none}

/* demo strip */
.demo{position:fixed;left:16px;bottom:16px;z-index:200;background:var(--color-popover);border:1px solid var(--color-border);
  border-radius:11px;padding:11px 13px;box-shadow:0 14px 36px rgba(0,0,0,.5);width:226px}
.demo .dh{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground);
  display:flex;align-items:center;gap:6px;margin-bottom:9px}
.seg{display:flex;border:1px solid var(--color-border);border-radius:7px;overflow:hidden;background:var(--color-input)}
.seg button{flex:1;padding:6px 4px;color:var(--color-muted-foreground);border-right:1px solid var(--color-border);font-size:11px;font-weight:500}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--color-secondary);color:var(--color-foreground)}
.demo .note{font-size:10.5px;color:var(--color-muted-foreground);margin-top:8px;line-height:1.45}
.af-toggle{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:10.5px;color:var(--color-muted-foreground);cursor:pointer;user-select:none}
.af-toggle input{accent-color:var(--ai);width:13px;height:13px;cursor:pointer}
</style>
</head>
<body class="dark">
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#1e2028"/><path d="M50 26l5 13 13 5-13 5-5 13-5-13-13-5 13-5z" fill="#a78bfa"/></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  cube:(p)=><svg width={p?.s||13} height={p?.s||13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7.5L12 2 3 7.5v9L12 22l9-5.5z"/><path d="M3 7.5L12 13l9-5.5M12 13v9"/></svg>,
  add:(p)=><svg width={p?.s||14} height={p?.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/></svg>,
};

/* ── collection tag vocabulary (existing tags) ──────────────── */
const VOCAB = {
  rust:"#e8845f", async:"#06b6d4", networking:"#14b8a6", docs:"#22c55e",
  databases:"#0ea5e9", favorites:"#f59e0b", career:"#a855f7", monitoring:"#ef4444",
  quarkus:"#dc2626", prod:"#f59e0b", uat:"#a855f7", reference:"#64748b",
};
const NEW_TAG_COLORS = ['#2563b0','#0e7490','#7c3aed','#b45309','#be123c','#15803d','#9333ea','#475569','#c2410c','#0f766e'];

const BOOKMARK = { title:"Tokio — An asynchronous runtime for Rust", url:"tokio.rs/blog/2024-scheduler" };
const MANUAL_INIT = ["favorites"];        // tags the user already chose
const RULE_SUGGESTS = ["docs"];           // instant, client-side URL-pattern match
const AI_SUGGESTS   = ["rust","async","networking"]; // gemma 2B, on-device

/* ── applied-tag chip in the field ──────────────────────────── */
function FieldChip({name,color,fold,onRemove}){
  return <span className={"chip"+(fold?" fold":"")} style={{"--tag":color}}>
    <span className="dot"></span>{name}
    <button className="rm" onClick={(e)=>{e.stopPropagation();onRemove();}} aria-label={"remove "+name}><Ico.x s={12}/></button>
  </span>;
}

/* ── tag combobox (search + create + checklist — from batch editor) ── */
function TagField({applied,setApplied,vocab,setVocab,foldSet}){
  const [open,setOpen]=useState(false);
  const [query,setQuery]=useState("");
  const wrapRef=useRef(null), inRef=useRef(null);

  useEffect(()=>{
    if(!open) return;
    setTimeout(()=>inRef.current?.focus(),30);
    const onDown=e=>{ if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    const onKey=e=>{ if(e.key==="Escape"){ setOpen(false); } };
    window.addEventListener("mousedown",onDown);
    window.addEventListener("keydown",onKey,true);
    return ()=>{ window.removeEventListener("mousedown",onDown); window.removeEventListener("keydown",onKey,true); };
  },[open]);

  const q=query.trim();
  const names=Object.keys(vocab)
    .filter(n=>!q||n.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>{ const oa=applied.includes(a)?0:1, ob=applied.includes(b)?0:1; return oa-ob || a.localeCompare(b); });
  const exact=Object.keys(vocab).some(n=>n.toLowerCase()===q.toLowerCase());

  function toggle(name){ setApplied(a=>a.includes(name)?a.filter(x=>x!==name):[...a,name]); }
  function create(){
    if(!q||exact) return;
    const color=NEW_TAG_COLORS[Object.keys(vocab).length % NEW_TAG_COLORS.length];
    setVocab(v=>({...v,[q]:color}));
    setApplied(a=>[...a,q]);
    setQuery("");
    setTimeout(()=>inRef.current?.focus(),0);
  }

  return <div className="tagctl" ref={wrapRef}>
    <div className={"tagfield"+(open?" open":"")} onClick={()=>setOpen(true)}>
      {applied.map(t=><FieldChip key={t} name={t} color={vocab[t]||"#64748b"} fold={foldSet?.has(t)} onRemove={()=>toggle(t)}/>)}
      <span className="ph"><Ico.plus s={12}/> {applied.length?"Add more…":"Find or add tags…"}</span>
    </div>
    {open && <div className="picker">
      <div className="pick-head">
        <div className="pick-search">
          <Ico.search s={13}/>
          <input ref={inRef} value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter"&&!exact&&q) create(); }} placeholder="Find or create a tag…"/>
        </div>
      </div>
      <div className="pick-list">
        {q && !exact &&
          <button className="pick-row pick-create" onClick={create}>
            <span className="plus"><Ico.plus s={13}/></span>
            <span>Create <b>“{q}”</b></span>
          </button>}
        {names.map(name=>{
          const on=applied.includes(name);
          return <button key={name} className={"pick-row"+(on?" on":"")} style={{"--tag":vocab[name]}} onClick={()=>toggle(name)}>
            <span className="pick-box">{on&&<Ico.check s={11}/>}</span>
            <span className="pdot"></span>
            <span className="pname">{name}</span>
          </button>;
        })}
        {names.length===0 && !q && <div className="pick-empty">No tags yet.</div>}
        {names.length===0 && q && exact===false && <div className="pick-empty">Press Enter to create “{q}”.</div>}
      </div>
    </div>}
  </div>;
}

/* ── suggestion chip ────────────────────────────────────────── */
function SugChip({name,source,selected,onToggle,vocab}){
  const isAi=source==="ai";
  return <button type="button" className={["sChip",isAi?"ai":"rule",selected?"sel":""].join(" ")}
    style={{"--tag":vocab[name]||"#64748b"}} onClick={onToggle}>
    <span className={"src"+(isAi?" ai":"")}>{isAi?<Ico.spark s={12}/>:<Ico.bolt s={11}/>}</span>
    <span className="dot"></span>{name}
    <span className="box">{selected&&<Ico.check s={11}/>}</span>
  </button>;
}
function Shimmer(){
  return <div className="skrow">
    <div className="sk" style={{width:86}}><span className="skdot"></span></div>
    <div className="sk" style={{width:98}}><span className="skdot"></span></div>
    <div className="sk" style={{width:74}}><span className="skdot"></span></div>
  </div>;
}

function SuggestedTags({aiState,vocab,sel,setSel,onAccept,onDismiss,runAi}){
  // de-dupe: a tag from both sources is attributed to the rule (higher priority)
  const rules=RULE_SUGGESTS.map(n=>({name:n}));
  const ruleSet=new Set(RULE_SUGGESTS);
  const ais=AI_SUGGESTS.filter(n=>!ruleSet.has(n)).map(n=>({name:n}));
  const aiReady=aiState==="ok";
  const total=rules.length+(aiReady?ais.length:0);
  const selCount=[...sel].length;
  function toggle(name){ setSel(s=>{ const n=new Set(s); n.has(name)?n.delete(name):n.add(name); return n; }); }

  // collapsed → a single trigger that brings suggestions back (also the initial/retrieve affordance)
  if(aiState==="collapsed")
    return <button className="retrieve" onClick={runAi}>
      <Ico.spark s={14}/> Suggest tags <span className="rmeta">· on-device gemma&nbsp;2B</span>
    </button>;

  return <div className="sug">
    <div className="sug-head">
      <div className="sug-title">
        <span className="sparkwrap"><Ico.spark s={13}/></span>
        Suggested tags
        {aiReady && total>0 && <span className="count-badge">{total}</span>}
      </div>
      <span className="privacy"><Ico.shield s={11}/> On-device · gemma&nbsp;2B</span>
    </div>

    <div className="sug-body">
      {/* rules — instant, client-side */}
      <div className="grp">
        <div className="grp-lab"><Ico.bolt s={11}/> From your rules</div>
        <div className="chiprow">
          {rules.map(m=><SugChip key={m.name} name={m.name} source="rule" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} vocab={vocab}/>)}
        </div>
      </div>

      {/* AI — explicit trigger; runs gemma 2B on demand */}
      <div className="grp">
        <div className="grp-lab ai"><Ico.spark s={12}/> AI suggestions
          {aiReady && <button className="regen" onClick={runAi}><Ico.refresh s={11}/> Regenerate</button>}
        </div>
        {aiState==="idle" ? (
          <div>
            <button className="ai-cta" onClick={runAi}><Ico.spark s={13}/> Suggest tags with AI</button>
            <div className="ai-hint">Reads the title &amp; URL on your device — takes a few seconds the first time.</div>
          </div>
        ) : aiState==="loading" ? (
          <Shimmer/>
        ) : aiState==="empty" ? (
          <div className="empty"><span className="ico"><Ico.spark s={14}/></span>
            <span>No confident matches. <button onClick={runAi} style={{color:"var(--ai)",fontWeight:600}}>Try again</button>.</span></div>
        ) : (
          <div className="chiprow">
            {ais.map(m=><SugChip key={m.name} name={m.name} source="ai" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} vocab={vocab}/>)}
          </div>
        )}
      </div>

      <div className="helper">Only existing collection tags are suggested — nothing new is created. Your manual tags are kept.</div>
    </div>

    <div className="sug-foot">
      <button className="btn-dismiss" onClick={onDismiss}>Dismiss</button>
      <button className="btn-accept" disabled={selCount===0||aiState==="loading"} onClick={onAccept}>
        <Ico.check s={13}/> Accept{selCount?` (${selCount})`:""}
      </button>
    </div>
  </div>;
}

/* ── Properties (collapsible, for full-dialog realism) ──────── */
const PROP_DEFS=[
  {name:"status",type:"select",options:["draft","review","published","archived"]},
  {name:"priority",type:"number"},
  {name:"needs-review",type:"boolean"},
  {name:"due",type:"date"},
];
function Properties(){
  const [open,setOpen]=useState(false);
  const [vals,setVals]=useState({});
  const set=(k,v)=>setVals(p=>({...p,[k]:v}));
  return <>
    <div className="psec-head" onClick={()=>setOpen(o=>!o)}>
      <span className="psec-lab"><Ico.cube s={13}/> Properties <span className="psec-badge">{PROP_DEFS.length}</span></span>
      <span className="psec-line"></span>
      <span className={"psec-chev"+(open?" open":"")}><Ico.chevD s={14}/></span>
    </div>
    <div className={"psec-wrap"+(open?" open":"")}>
      <div className="psec-inner">
        {PROP_DEFS.map(pd=><div className="field" key={pd.name}>
          <div className="flabel" style={{textTransform:"none",letterSpacing:0}}>{pd.name} <span className="type-badge">{pd.type}</span></div>
          {pd.type==="select" && <div className="selwrap"><select className="inp" value={vals[pd.name]||""} onChange={e=>set(pd.name,e.target.value)}>
            <option value="">— not set —</option>{pd.options.map(o=><option key={o}>{o}</option>)}</select><span className="chev"><Ico.chevD s={13}/></span></div>}
          {pd.type==="number" && <input className="inp" type="number" placeholder="0" value={vals[pd.name]||""} onChange={e=>set(pd.name,e.target.value)}/>}
          {pd.type==="date" && <input className="inp" type="date" value={vals[pd.name]||""} onChange={e=>set(pd.name,e.target.value)}/>}
          {pd.type==="boolean" && <div className="selwrap"><select className="inp" value={vals[pd.name]||""} onChange={e=>set(pd.name,e.target.value)}>
            <option value="">No</option><option>Yes</option></select><span className="chev"><Ico.chevD s={13}/></span></div>}
        </div>)}
      </div>
    </div>
  </>;
}

/* ── Dialog ─────────────────────────────────────────────────── */
function App(){
  const [vocab,setVocab]=useState(VOCAB);
  const [applied,setApplied]=useState(MANUAL_INIT);
  const [aiState,setAiState]=useState("idle"); // idle|loading|ok|empty|collapsed
  const [title,setTitle]=useState(BOOKMARK.title);
  const [url,setUrl]=useState("https://"+BOOKMARK.url);
  const [autoFire,setAutoFire]=useState(true); // demo toggle for the auto-fire behavior
  const [sel,setSel]=useState(()=>new Set([...RULE_SUGGESTS,...AI_SUGGESTS]));
  const [foldSet,setFoldSet]=useState(new Set());
  const [flash,setFlash]=useState(false);
  const flashT=useRef(null);
  const fireT=useRef(null);
  const dismissedFor=useRef(null); // url we've already auto-fired/dismissed for — don't nag

  // Auto-fire: once Title + URL are both present, debounce ~700ms then run the model.
  // Re-arms when the URL changes; never overrides a manual dismiss for the same URL.
  useEffect(()=>{
    if(!autoFire) return;
    clearTimeout(fireT.current);
    const ready=title.trim() && url.trim().length>10;
    if(!ready) return;
    if(aiState!=="idle") return;          // don't interrupt loading/results/collapsed
    if(dismissedFor.current===url) return; // already handled this URL
    fireT.current=setTimeout(()=>{ dismissedFor.current=url; runAi(); },700);
    return ()=>clearTimeout(fireT.current);
  },[title,url,aiState,autoFire]);

  function resetSuggestions(state){
    setSel(new Set([...RULE_SUGGESTS,...AI_SUGGESTS]));
    setAiState(state);
  }
  // explicit AI trigger: warm-up is silent on open; this fires the actual suggest call
  function runAi(){
    setSel(new Set([...RULE_SUGGESTS,...AI_SUGGESTS]));
    setAiState("loading");
    setTimeout(()=>setAiState("ok"),2000);
  }
  function setDemo(state){
    if(state==="loading") runAi();
    else { dismissedFor.current=url; resetSuggestions(state); }
  }

  function accept(){
    const chosen=[...RULE_SUGGESTS,...AI_SUGGESTS].filter(t=>sel.has(t));
    const add=chosen.filter(t=>!applied.includes(t));
    setFoldSet(new Set(add));
    setApplied(a=>[...a,...add]);
    dismissedFor.current=url; // don't auto-fire again for this URL after accepting
    setAiState("collapsed");
    setFlash(true);
    clearTimeout(flashT.current);
    flashT.current=setTimeout(()=>{ setFlash(false); setFoldSet(new Set()); },2600);
  }

  return <>
    <div className="modal" role="dialog" aria-label="Add bookmark">
      <div className="m-head">
        <div>
          <h2><Ico.add s={15}/> Add bookmark</h2>
          <div className="sub mono">{BOOKMARK.url}</div>
        </div>
        <button className="icon-btn" aria-label="Close"><Ico.x s={14}/></button>
      </div>

      <div className="m-body">
        <div className="field"><div className="flabel">Title</div>
          <input className="inp" value={title} onChange={e=>setTitle(e.target.value)}/></div>
        <div className="field"><div className="flabel">URL</div>
          <input className="inp mono" style={{fontSize:12.5}} value={url} onChange={e=>{ setUrl(e.target.value); }}/></div>
        <div className="field"><div className="flabel">Description</div>
          <textarea className="inp" rows={2} placeholder="Optional notes…"></textarea></div>

        <div className="row2">
          <div className="field"><div className="flabel">Folder</div>
            <div className="selwrap"><select className="inp" defaultValue="insel">
              <option>My Bookmarks</option><option>insel</option><option>dvbern</option><option>kis</option>
            </select><span className="chev"><Ico.chevD s={13}/></span></div></div>
        </div>

        <div className="field" style={{marginBottom:0}}>
          <div className="flabel"><Ico.tag s={12}/> Tags</div>
          <TagField applied={applied} setApplied={setApplied} vocab={vocab} setVocab={setVocab} foldSet={foldSet}/>
        </div>

        <SuggestedTags aiState={aiState} vocab={vocab} sel={sel} setSel={setSel} onAccept={accept}
          onDismiss={()=>{ dismissedFor.current=url; setAiState("collapsed"); }} runAi={runAi}/>

        <Properties/>
      </div>

      <div className="m-foot">
        {flash && <span className={"applied-flash"+(flash?" show":"")}><Ico.check s={14}/> Suggested tags applied</span>}
        <button className="btn-sm">Cancel</button>
        <button className="btn-sm pri">Save bookmark</button>
      </div>
    </div>

    {/* demo scaffolding — preview AI states */}
    <div className="demo">
      <div className="dh"><Ico.spark s={11}/> Preview · AI state</div>
      <div className="seg">
        {[["idle","Idle"],["loading","Loading"],["ok","Results"],["empty","Empty"]].map(([k,l])=>
          <button key={k} className={aiState===k?"on":""} onClick={()=>setDemo(k)}>{l}</button>)}
      </div>
      <div className="note">Rule chips show instantly; AI chips replace the shimmer when gemma 2B returns. Accept folds them into Tags above.</div>
      <label className="af-toggle">
        <input type="checkbox" checked={autoFire} onChange={e=>setAutoFire(e.target.checked)}/>
        <span>Auto-fire on title + URL</span>
      </label>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
