<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chainlink — AI Suggested Tags</title>
<style>
.dark{
  --color-background:#14161a;--color-foreground:#ededed;--color-card:#1e2028;
  --color-primary:#3b82f6;--color-secondary:#252a32;--color-muted:#252a32;
  --color-muted-foreground:#a3a3a3;--color-popover:#22262f;--color-border:#363d49;
  --color-input:#252a32;--color-ring:#3b82f6;
  /* AI accent — violet, deliberately distinct from the blue primary + tag dot colors */
  --ai:#a78bfa;--ai-strong:#8b5cf6;--ai-soft:#6d5bd0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-background);color:var(--color-foreground);
  font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;
  min-height:100vh}
button{font:inherit;color:inherit;cursor:pointer}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

/* ── Exploration chrome ─────────────────────────────────────── */
.page{max-width:760px;margin:0 auto;padding:34px 24px 80px}
.kicker{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--color-muted-foreground)}
.kicker .mark{width:22px;height:22px;border-radius:6px;background:var(--color-primary);display:grid;
  place-items:center;color:#fff;font-weight:700;font-size:10px}
h1.title{font-size:23px;font-weight:700;letter-spacing:-.02em;margin:13px 0 5px}
.lede{font-size:13.5px;color:var(--color-muted-foreground);max-width:62ch;line-height:1.6}

.controls{margin:24px 0 22px;display:flex;flex-wrap:wrap;gap:18px 26px;
  padding:15px 17px;background:color-mix(in oklab,var(--color-card) 60%,transparent);
  border:1px solid var(--color-border);border-radius:11px}
.cgroup{display:flex;flex-direction:column;gap:7px}
.cgroup .clab{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--color-muted-foreground);display:flex;align-items:center;gap:6px}
.seg{display:inline-flex;border:1px solid var(--color-border);border-radius:7px;overflow:hidden;background:var(--color-input)}
.seg button{padding:6px 11px;background:transparent;color:var(--color-muted-foreground);border:0;
  border-right:1px solid var(--color-border);font-size:12px;font-weight:500;white-space:nowrap;transition:.13s}
.seg button:last-child{border-right:0}
.seg button:hover{color:var(--color-foreground)}
.seg button.on{background:var(--color-secondary);color:var(--color-foreground)}
.runbtn{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:7px;border:0;
  background:var(--color-primary);color:#fff;font-size:12.5px;font-weight:600}
.runbtn:hover{filter:brightness(1.08)}
.runbtn:disabled{opacity:.5;cursor:default;filter:none}

/* ── The modal slice ─────────────────────────────────────────── */
.modal{background:var(--color-card);border:1px solid var(--color-border);border-radius:13px;
  box-shadow:0 24px 70px rgba(0,0,0,.5);overflow:hidden}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;
  align-items:flex-start;justify-content:space-between;gap:12px}
.modal-head h2{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.modal-head .sub{font-size:11.5px;color:var(--color-muted-foreground);margin-top:3px}
.icon-btn{width:28px;height:28px;border-radius:7px;border:0;background:transparent;color:var(--color-muted-foreground);
  display:grid;place-items:center}
.icon-btn:hover{background:var(--color-secondary);color:var(--color-foreground)}
.modal-body{padding:18px 20px 20px}

/* field label */
.flabel{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--color-muted-foreground);margin-bottom:7px;display:flex;align-items:center;gap:6px}

/* tags input (manual) */
.tagfield{min-height:40px;border:1px solid var(--color-border);background:var(--color-input);
  border-radius:8px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tagfield:focus-within{border-color:var(--color-ring);box-shadow:0 0 0 2px color-mix(in oklab,var(--color-ring) 18%,transparent)}
.tagfield .ph{color:var(--color-muted-foreground);font-size:13px;padding:2px 4px;flex:1;min-width:90px}

/* chips */
.chip{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 9px;border-radius:9999px;
  font-size:12px;font-weight:500;background:var(--color-secondary);color:var(--color-foreground);
  border:1px solid transparent;white-space:nowrap;transition:background .14s,border-color .14s,opacity .14s,transform .14s}
.chip .dot{width:7px;height:7px;border-radius:2px;background:var(--tag,var(--color-muted-foreground));flex-shrink:0}
.chip .rm{display:inline-flex;color:var(--color-muted-foreground);margin:0 -3px 0 1px;border-radius:4px}
.chip .rm:hover{color:var(--color-foreground)}
.chip.applied{border-color:color-mix(in oklab,var(--tag) 50%,var(--color-border));
  background:color-mix(in oklab,var(--tag) 14%,var(--color-secondary))}

/* ── Suggested tags section ─────────────────────────────────── */
.sug{margin-top:18px;border:1px solid var(--color-border);border-radius:11px;
  background:color-mix(in oklab,var(--ai) 4%,var(--color-background));overflow:hidden}
.sug-head{display:flex;align-items:center;gap:10px;padding:11px 13px;
  border-bottom:1px solid color-mix(in oklab,var(--color-border) 70%,transparent)}
.sug-title{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;flex:1;min-width:0}
.sparkwrap{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;
  background:color-mix(in oklab,var(--ai) 20%,transparent);color:var(--ai)}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;
  padding:0 5px;border-radius:9999px;font-size:10.5px;font-weight:600;
  background:color-mix(in oklab,var(--ai) 22%,transparent);color:var(--ai)}
.privacy{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;
  color:var(--color-muted-foreground);padding:3px 8px;border-radius:9999px;
  background:var(--color-secondary);border:1px solid var(--color-border);white-space:nowrap}
.privacy svg{color:#22c55e}
.sug-body{padding:13px}
.chiprow{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.helper{font-size:11.5px;color:var(--color-muted-foreground);margin-top:11px;line-height:1.5}

/* group sub-headers (distinguish=groups) */
.grp{display:flex;flex-direction:column;gap:8px}
.grp+.grp{margin-top:13px}
.grp-lab{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--color-muted-foreground)}
.grp-lab.ai{color:var(--ai)}

/* suggestion chip — toggleable */
.sChip{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 5px 0 9px;border-radius:9999px;
  font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;user-select:none;
  border:1px solid var(--color-border);background:var(--color-secondary);color:var(--color-foreground);
  transition:background .14s,border-color .14s,opacity .14s,box-shadow .14s,transform .12s}
.sChip .dot{width:7px;height:7px;border-radius:2px;background:var(--tag);flex-shrink:0}
.sChip .src{display:inline-flex;align-items:center;color:var(--color-muted-foreground);flex-shrink:0}
.sChip .box{width:16px;height:16px;border-radius:5px;display:grid;place-items:center;flex-shrink:0;
  border:1.5px solid var(--color-border);color:transparent;transition:.14s;margin-left:1px}
.sChip.sel .box{background:var(--accent,var(--color-primary));border-color:var(--accent,var(--color-primary));color:#fff}
.sChip.sel{background:color-mix(in oklab,var(--accent) 12%,var(--color-secondary));
  border-color:color-mix(in oklab,var(--accent) 45%,var(--color-border))}
.sChip:not(.sel){opacity:.62}
.sChip:not(.sel):hover{opacity:.9}
.sChip.sel:hover{background:color-mix(in oklab,var(--accent) 18%,var(--color-secondary))}
.sChip.ai{--accent:var(--ai-strong)}
.sChip.rule{--accent:var(--color-primary)}
.sChip .src.ai{color:var(--ai)}

/* distinguish=style : stronger chip-style differences */
.styleMode .sChip.ai{background:color-mix(in oklab,var(--ai) 10%,var(--color-card));
  border-color:color-mix(in oklab,var(--ai) 40%,var(--color-border));border-style:solid}
.styleMode .sChip.ai.sel{background:color-mix(in oklab,var(--ai) 20%,var(--color-card));
  box-shadow:0 0 0 1px color-mix(in oklab,var(--ai) 35%,transparent),0 4px 14px color-mix(in oklab,var(--ai) 22%,transparent)}
.styleMode .sChip.rule{border-style:dashed}

/* pop-in (streaming) */
@keyframes popIn{0%{opacity:0;transform:translateY(5px) scale(.86)}60%{opacity:1;transform:translateY(0) scale(1.04)}100%{transform:scale(1)}}
.pop{animation:popIn .34s cubic-bezier(.2,.9,.3,1.2) both}

/* shimmer skeleton chips */
.skrow{display:flex;gap:7px;align-items:center}
.sk{height:28px;border-radius:9999px;position:relative;overflow:hidden;
  background:color-mix(in oklab,var(--ai) 8%,var(--color-secondary));
  border:1px solid color-mix(in oklab,var(--ai) 16%,var(--color-border))}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,color-mix(in oklab,var(--ai) 24%,transparent),transparent);
  animation:shimmer 1.15s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}

/* analyzing indicator */
.analyzing{display:inline-flex;align-items:center;gap:9px;font-size:12px;color:var(--color-muted-foreground)}
.analyzing .sp{color:var(--ai);display:inline-flex;animation:spPulse 1.3s ease-in-out infinite}
@keyframes spPulse{0%,100%{opacity:.45;transform:scale(.9) rotate(0deg)}50%{opacity:1;transform:scale(1.12) rotate(15deg)}}
.dots{display:inline-flex;gap:3px}
.dots i{width:4px;height:4px;border-radius:50%;background:var(--ai);display:inline-block;animation:dot 1.1s infinite}
.dots i:nth-child(2){animation-delay:.15s}
.dots i:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.barwrap{height:3px;border-radius:3px;background:color-mix(in oklab,var(--ai) 12%,var(--color-secondary));
  overflow:hidden;margin-top:9px}
.bar{height:100%;width:38%;border-radius:3px;background:linear-gradient(90deg,transparent,var(--ai),transparent);
  animation:slide 1.25s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(310%)}}

/* empty */
.empty{display:flex;align-items:center;gap:10px;padding:4px 2px;color:var(--color-muted-foreground);font-size:12.5px}
.empty .ico{width:26px;height:26px;border-radius:7px;background:var(--color-secondary);display:grid;place-items:center;flex-shrink:0}

/* applied confirmation */
.applied-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#22c55e;font-weight:500}
.applied-row svg{flex-shrink:0}

.foot{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:12px 13px;border-top:1px solid color-mix(in oklab,var(--color-border) 70%,transparent)}
.btn-accept{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 14px;border-radius:8px;border:0;
  font-size:12.5px;font-weight:600;background:var(--ai-strong);color:#fff;transition:.14s}
.btn-accept:hover{filter:brightness(1.08)}
.btn-accept:disabled{opacity:.45;cursor:default;filter:none}
.btn-dismiss{height:32px;padding:0 11px;border-radius:8px;border:1px solid var(--color-border);
  background:transparent;color:var(--color-muted-foreground);font-size:12.5px;font-weight:500}
.btn-dismiss:hover{color:var(--color-foreground);background:var(--color-secondary)}

.legend{margin-top:22px;display:flex;flex-wrap:wrap;gap:7px 18px;font-size:11.5px;color:var(--color-muted-foreground)}
.legend .li{display:inline-flex;align-items:center;gap:7px}
.legend .sw{width:14px;height:14px;border-radius:5px;display:grid;place-items:center}
</style>
</head>
<body class="dark">
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="20" fill="#1e2028"/><path d="M50 26l5 13 13 5-13 5-5 13-5-13-13-5 13-5z" fill="#a78bfa"/></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef} = React;

/* ── icons ──────────────────────────────────────────────────── */
const Ico = {
  spark:(p)=><svg width={p?.s||14} height={p?.s||14} viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.6l1.9 5.4 5.5 1.9-5.5 1.9L12 17.4l-1.9-5.6L4.6 9.9l5.5-1.9z"/><path d="M19 14l.8 2.2 2.2.8-2.2.8L19 20l-.8-2.2-2.2-.8 2.2-.8z" opacity=".7"/></svg>,
  bolt:(p)=><svg width={p?.s||13} height={p?.s||13} viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.5 13.2c-.4.5 0 1.3.6 1.3H10l-1.3 7.2c-.1.7.8 1.1 1.2.5l8.6-11.3c.4-.5 0-1.3-.6-1.3H13l1.3-7.2c.1-.7-.8-1.1-1.3-.5z"/></svg>,
  check:(p)=><svg width={p?.s||13} height={p?.s||13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
  x:(p)=><svg width={p?.s||13} height={p?.s||13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  shield:(p)=><svg width={p?.s||11} height={p?.s||11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/></svg>,
  edit:(p)=><svg width={p?.s||14} height={p?.s||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4v16h16v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg>,
  tag:(p)=><svg width={p?.s||12} height={p?.s||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12V4a1 1 0 011-1h8l9 9-9 9z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/></svg>,
};

/* ── data ───────────────────────────────────────────────────── */
const TAG = {
  rust:"#e8845f", async:"#06b6d4", networking:"#14b8a6", docs:"#22c55e",
  databases:"#0ea5e9", favorites:"#f59e0b", career:"#a855f7",
};
const BOOKMARK = { title:"Tokio — An asynchronous runtime for Rust", url:"tokio.rs/blog/2024-scheduler" };
// manual tags the user already chose (preserved on accept — BR-079)
const MANUAL = ["favorites"];
// rule-based matches (instant, client-side) — URL pattern → docs
const RULE_SUGGESTS = ["docs"];
// LLM suggestions (gemma 2B, on-device) — note "docs" also implied but de-duped to the rule source
const AI_SUGGESTS = ["rust","async","networking"];

function Chip({name,applied,onRemove}){
  return <span className={"chip"+(applied?" applied":"")} style={{"--tag":TAG[name]}}>
    <span className="dot"></span>{name}
    {onRemove&&<button className="rm" onClick={onRemove} aria-label={"remove "+name}><Ico.x s={12}/></button>}
  </span>;
}

function SugChip({name,source,selected,onToggle,distinguish,pop}){
  const isAi = source==="ai";
  const cls = ["sChip",isAi?"ai":"rule",selected?"sel":"",pop?"pop":""].join(" ");
  const showIcon = distinguish!=="style"; // icons in 'icon' and 'groups'; style mode leans on chip styling
  return <button className={cls} style={{"--tag":TAG[name]}} onClick={onToggle} type="button">
    {showIcon && <span className={"src"+(isAi?" ai":"")}>{isAi?<Ico.spark s={12}/>:<Ico.bolt s={11}/>}</span>}
    <span className="dot"></span>{name}
    <span className="box">{selected&&<Ico.check s={11}/>}</span>
  </button>;
}

/* loading visuals */
function Loader({mode}){
  if(mode==="shimmer") return <div className="skrow">
    <div className="sk" style={{width:84}}></div><div className="sk" style={{width:96}}></div><div className="sk" style={{width:72}}></div>
  </div>;
  if(mode==="analyzing") return <div>
    <div className="analyzing"><span className="sp"><Ico.spark s={15}/></span>
      <span>Reading title &amp; URL<span className="dots"><i></i><i></i><i></i></span></span></div>
    <div className="barwrap"><div className="bar"></div></div>
  </div>;
  // streaming: brief placeholder then chips pop in (handled by parent timing) — show a minimal cue
  return <div className="analyzing"><span className="sp"><Ico.spark s={15}/></span><span>Generating suggestions<span className="dots"><i></i><i></i><i></i></span></span></div>;
}

function App(){
  const [state,setState]   = useState("suggested"); // loading|suggested|empty|accepted
  const [distinguish,setD] = useState("icon");       // icon|groups|style
  const [anim,setAnim]     = useState("shimmer");    // shimmer|analyzing|stream
  const [sel,setSel]       = useState(()=>new Set([...RULE_SUGGESTS,...AI_SUGGESTS])); // pre-selected
  const [manual,setManual] = useState(MANUAL);
  const [streamN,setStreamN]= useState(0); // how many AI chips have popped (streaming)
  const timers = useRef([]);

  function clearTimers(){ timers.current.forEach(clearTimeout); timers.current=[]; }
  useEffect(()=>()=>clearTimers(),[]);

  function resetSel(){ setSel(new Set([...RULE_SUGGESTS,...AI_SUGGESTS])); }

  // Play the full wait → reveal sequence so the loading animation is visible in context
  function run(){
    clearTimers();
    setManual(MANUAL); resetSel(); setStreamN(0);
    setState("loading");
    const wait = 2100;
    if(anim==="stream"){
      // reveal rule chips instantly already shown; pop AI chips one by one
      timers.current.push(setTimeout(()=>{ setState("suggested"); },900));
      AI_SUGGESTS.forEach((_,i)=>timers.current.push(setTimeout(()=>setStreamN(i+1), 900+260*(i+1))));
    } else {
      timers.current.push(setTimeout(()=>{ setState("suggested"); setStreamN(AI_SUGGESTS.length); }, wait));
    }
  }

  function pick(state){
    clearTimers();
    if(state==="suggested"){ resetSel(); setManual(MANUAL); setStreamN(AI_SUGGESTS.length); }
    if(state==="loading"){ setStreamN(0); }
    setState(state);
  }

  function toggle(name){ setSel(s=>{ const n=new Set(s); n.has(name)?n.delete(name):n.add(name); return n; }); }

  function accept(){
    const add = [...RULE_SUGGESTS,...AI_SUGGESTS].filter(t=>sel.has(t)&&!manual.includes(t));
    setManual(m=>[...m,...add]);
    setState("accepted");
  }

  const selCount = [...RULE_SUGGESTS,...AI_SUGGESTS].filter(t=>sel.has(t)).length;

  // merged + de-duped list (built-in/custom rules → LLM), highest-priority source wins ties
  const merged = useMemo(()=>{
    const seen=new Set(); const out=[];
    RULE_SUGGESTS.forEach(t=>{ if(!seen.has(t)){seen.add(t); out.push({name:t,source:"rule"});} });
    AI_SUGGESTS.forEach(t=>{ if(!seen.has(t)){seen.add(t); out.push({name:t,source:"ai"});} });
    return out;
  },[]);
  const rules = merged.filter(m=>m.source==="rule");
  const ais   = merged.filter(m=>m.source==="ai");

  const Seg = ({val,set,opts}) =>
    <div className="seg">{opts.map(([k,l])=><button key={k} className={val===k?"on":""} onClick={()=>set(k)}>{l}</button>)}</div>;

  return <div className="page">
    <div className="kicker"><span className="mark">cl</span> Chainlink · Add / Edit bookmark</div>
    <h1 className="title">AI Suggested Tags</h1>
    <p className="lede">A second suggestion source — an on-device model (gemma&nbsp;2B) reads the bookmark and proposes tags drawn only from your collection. Rule-based matches appear instantly; AI suggestions fold in when the model returns. Everything is pre-selected and stays separate until you accept.</p>

    <div className="controls">
      <div className="cgroup"><span className="clab">State</span>
        <Seg val={state} set={pick} opts={[["loading","Loading"],["suggested","Suggestions"],["empty","No matches"],["accepted","Accepted"]]}/>
      </div>
      <div className="cgroup"><span className="clab"><Ico.spark s={11}/> AI vs rule</span>
        <Seg val={distinguish} set={setD} opts={[["icon","Per-chip icon"],["groups","Grouped"],["style","Chip style"]]}/>
      </div>
      <div className="cgroup"><span className="clab">Wait animation</span>
        <Seg val={anim} set={setAnim} opts={[["shimmer","Shimmer"],["analyzing","Analyzing"],["stream","Stream"]]}/>
      </div>
      <div className="cgroup"><span className="clab">&nbsp;</span>
        <button className="runbtn" onClick={run}><Ico.spark s={13}/> Play wait → reveal</button>
      </div>
    </div>

    {/* ── modal slice ── */}
    <div className="modal">
      <div className="modal-head">
        <div>
          <h2><Ico.edit s={14}/> Edit bookmark</h2>
          <div className="sub mono">{BOOKMARK.url}</div>
        </div>
        <button className="icon-btn"><Ico.x s={14}/></button>
      </div>
      <div className="modal-body">
        <div className="flabel"><Ico.tag s={12}/> Tags</div>
        <div className="tagfield">
          {manual.map(t=><Chip key={t} name={t} applied onRemove={()=>setManual(m=>m.filter(x=>x!==t))}/>)}
          <span className="ph">Type to add a tag…</span>
        </div>

        {/* ── Suggested tags ── */}
        <div className={"sug"+(distinguish==="style"?" styleMode":"")}>
          <div className="sug-head">
            <div className="sug-title">
              <span className="sparkwrap"><Ico.spark s={13}/></span>
              Suggested tags
              {state==="suggested" && <span className="count-badge">{merged.length}</span>}
            </div>
            <span className="privacy"><Ico.shield s={11}/> On-device · gemma&nbsp;2B</span>
          </div>

          <div className="sug-body">
            {state==="accepted" ? (
              <div className="applied-row"><Ico.check s={15}/> Suggestions applied to your tags.</div>
            ) : state==="empty" ? (
              <div className="empty"><span className="ico"><Ico.spark s={14}/></span>
                <span>No confident suggestions for this bookmark. Add tags manually above.</span></div>
            ) : distinguish==="groups" ? (
              <GroupedBody {...{state,anim,rules,ais,sel,toggle,streamN}}/>
            ) : (
              <FlatBody {...{state,anim,distinguish,rules,ais,sel,toggle,streamN}}/>
            )}

            {(state==="suggested") &&
              <div className="helper">Toggle off any that don't fit. Only existing collection tags are suggested — nothing new is created.</div>}
          </div>

          {(state==="suggested") &&
            <div className="foot">
              <button className="btn-dismiss" onClick={()=>setState("accepted")}>Dismiss</button>
              <button className="btn-accept" disabled={selCount===0} onClick={accept}>
                <Ico.check s={13}/> Accept{selCount?` (${selCount})`:""}
              </button>
            </div>}
        </div>
      </div>
    </div>

    <div className="legend">
      <span className="li"><span className="sw" style={{background:"color-mix(in oklab,var(--color-primary) 22%,transparent)",color:"var(--color-primary)"}}><Ico.bolt s={11}/></span> Rule-based · instant, client-side</span>
      <span className="li"><span className="sw" style={{background:"color-mix(in oklab,var(--ai) 22%,transparent)",color:"var(--ai)"}}><Ico.spark s={11}/></span> AI · on-device gemma 2B</span>
    </div>
  </div>;
}

/* Flat list (distinguish = icon | style): rules first, then AI, de-duped */
function FlatBody({state,anim,distinguish,rules,ais,sel,toggle,streamN}){
  return <div className="chiprow">
    {rules.map(m=><SugChip key={m.name} name={m.name} source="rule" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} distinguish={distinguish}/>)}
    {state==="loading"
      ? <Loader mode={anim}/>
      : ais.slice(0,anim==="stream"?streamN:ais.length).map((m,i)=>
          <SugChip key={m.name} name={m.name} source="ai" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} distinguish={distinguish} pop={anim==="stream"}/>)}
  </div>;
}

/* Grouped (distinguish = groups): explicit AI / rules sub-rows */
function GroupedBody({state,anim,rules,ais,sel,toggle,streamN}){
  return <div>
    {rules.length>0 && <div className="grp">
      <div className="grp-lab"><Ico.bolt s={11}/> From your rules</div>
      <div className="chiprow">
        {rules.map(m=><SugChip key={m.name} name={m.name} source="rule" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} distinguish="groups"/>)}
      </div>
    </div>}
    <div className="grp">
      <div className="grp-lab ai"><Ico.spark s={12}/> AI suggestions</div>
      {state==="loading"
        ? <Loader mode={anim}/>
        : <div className="chiprow">
            {ais.slice(0,anim==="stream"?streamN:ais.length).map(m=>
              <SugChip key={m.name} name={m.name} source="ai" selected={sel.has(m.name)} onToggle={()=>toggle(m.name)} distinguish="groups" pop={anim==="stream"}/>)}
          </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
