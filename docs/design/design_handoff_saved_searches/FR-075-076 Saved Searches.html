<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>LinkWeave — FR-075/076 Saved Searches</title>
<style>
.dark{--bg:#14161a;--fg:#ededed;--card:#1e2028;--pri:#3b82f6;--sec:#252a32;--mfg:#a3a3a3;--dst:#dc2626;--pop:#22262f;--bdr:#363d49;--inp:#252a32;--rng:#3b82f6}
:root{--bg:#f9fafb;--fg:#111827;--card:#ffffff;--pri:#2563eb;--sec:#f3f4f6;--mfg:#6b7280;--dst:#ef4444;--pop:#ffffff;--bdr:#e5e7eb;--inp:#e5e7eb;--rng:#2563eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font:14px/1.5 ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;cursor:pointer}

/* ── Layout ── */
.app{display:grid;grid-template-columns:224px 1fr;grid-template-rows:52px 1fr;height:100vh;grid-template-areas:"hd hd""sb mn"}
.hd{grid-area:hd;border-bottom:1px solid var(--bdr);background:var(--card);display:flex;align-items:center;padding:0 16px;gap:14px;position:relative;z-index:40}
.brand{display:flex;align-items:center;gap:8px;width:208px;flex-shrink:0}
.bmark{width:24px;height:24px;border-radius:6px;background:var(--pri);display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px}
.coll-btn{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;font-weight:600;font-size:13.5px;background:transparent;border:0}
.coll-btn:hover{background:var(--sec)}
.search-wrap{flex:1;display:flex;justify-content:center}
.search-shell{position:relative;width:min(540px,100%)}
.search{display:flex;align-items:center;gap:7px;height:32px;padding:0 7px 0 10px;background:var(--inp);border:1px solid var(--bdr);border-radius:6px}
.search:focus-within{border-color:var(--rng);box-shadow:0 0 0 3px color-mix(in oklab,var(--rng) 20%,transparent)}
.search input{flex:1;background:transparent;border:0;outline:0;color:var(--fg);font:13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;min-width:0}
.search input::placeholder{color:var(--mfg);font-family:ui-sans-serif,system-ui,sans-serif}
.kbd{padding:1px 5px;font-size:10px;color:var(--mfg);background:var(--card);border:1px solid var(--bdr);border-radius:4px;flex-shrink:0}
.h-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-pri{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;background:var(--pri);color:#fff;border:0;border-radius:6px;font-weight:500;font-size:13px}
.btn-pri:hover{filter:brightness(1.08)}
.btn-ghost{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 8px;background:transparent;border:0;border-radius:6px;font-size:13px}
.btn-ghost:hover{background:var(--sec)}
.btn-sm{display:inline-flex;align-items:center;gap:4px;height:27px;padding:0 10px;border-radius:5px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:transparent;color:var(--fg)}
.btn-sm:hover{background:var(--sec)}
.btn-sm.pri{background:var(--pri);color:#fff;border-color:transparent}
.btn-sm.pri:hover{filter:brightness(1.08)}
.btn-sm:disabled{opacity:.4;pointer-events:none}
.icon-btn{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:5px;border:0;background:transparent;color:var(--mfg)}
.icon-btn:hover{background:var(--sec);color:var(--fg)}

/* Save icon inside search bar (Variation A) */
.save-icon-btn{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:4px;border:0;background:transparent;color:var(--mfg);flex-shrink:0;transition:color .15s,opacity .2s,background .12s;opacity:0;pointer-events:none}
.save-icon-btn.vis{opacity:1;pointer-events:auto}
.save-icon-btn:hover{color:var(--pri);background:color-mix(in oklab,var(--pri) 10%,transparent)}

/* ── Sidebar ── */
.sb{grid-area:sb;border-right:1px solid var(--bdr);overflow-y:auto;padding:10px 8px}
.s-row{display:flex;align-items:center;gap:8px;height:28px;padding:0 8px;border-radius:6px;font-size:13px;cursor:pointer;position:relative;user-select:none}
.s-row:hover{background:var(--sec)}
.s-row.active{background:color-mix(in oklab,var(--pri) 12%,var(--sec));color:var(--pri)}
.s-ico{display:inline-flex;flex-shrink:0}
.s-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-head{padding:14px 8px 4px;color:var(--mfg);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tag-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Smart Collections section header */
.sc-hd{display:flex;align-items:center;width:100%;padding:14px 8px 4px;color:var(--mfg);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:0;border-radius:5px;gap:5px;cursor:pointer;user-select:none}
.sc-hd:hover{color:var(--fg)}
.sc-hd-lbl{flex:1;text-align:left}
.sc-hd-add{opacity:0;display:inline-grid;place-items:center;width:15px;height:15px;border-radius:3px;transition:opacity .12s,color .1s;color:var(--mfg);flex-shrink:0;background:transparent;border:0;padding:0}
.sc-hd:hover .sc-hd-add{opacity:1}
.sc-hd-add:hover{color:var(--pri) !important}
.sc-chev{display:inline-flex;transition:transform .22s ease;flex-shrink:0}
.sc-chev.open{transform:rotate(180deg)}

/* Collapsible wrap */
.sc-wrap{display:grid;grid-template-rows:1fr;transition:grid-template-rows .22s ease,opacity .18s ease;opacity:1}
.sc-wrap.shut{grid-template-rows:0fr;opacity:0;pointer-events:none}
.sc-inner{overflow:hidden}
.sc-empty{padding:5px 8px 6px;font-size:12px;color:var(--mfg)}

/* SC row hover actions */
.sc-act{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:4px;border:0;background:transparent;color:var(--mfg);opacity:0;transition:opacity .1s;flex-shrink:0}
.s-row:hover .sc-act,.s-row:focus-within .sc-act{opacity:1}
.sc-act:hover{background:var(--sec);color:var(--fg)}
.sc-menu{position:absolute;right:6px;top:calc(100% + 3px);background:var(--pop);border:1px solid var(--bdr);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:300;min-width:126px;padding:3px}
.sc-mi{display:flex;align-items:center;gap:7px;padding:6px 10px;font-size:12.5px;border-radius:5px;width:100%;background:transparent;border:0;text-align:left;color:var(--fg);cursor:pointer}
.sc-mi:hover{background:var(--sec)}
.sc-mi.red{color:var(--dst)}
.sc-mi.red:hover{background:color-mix(in oklab,var(--dst) 8%,var(--sec))}
.sc-rename{flex:1;background:var(--inp);border:1px solid var(--rng);border-radius:4px;color:var(--fg);font:13px/1 ui-sans-serif,system-ui,sans-serif;padding:0 5px;height:22px;outline:0;min-width:0;box-shadow:0 0 0 2px color-mix(in oklab,var(--rng) 18%,transparent)}

/* ── Main ── */
.mn{grid-area:mn;overflow-y:auto}
.toolbar{position:sticky;top:0;z-index:30;height:44px;display:flex;align-items:center;padding:0 20px;background:color-mix(in oklab,var(--bg) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr)}
.bc{flex:1;font-size:13px;color:var(--mfg);display:flex;align-items:center;gap:6px}
.content{padding:16px 20px 80px}

/* ── Chip strip ── */
.chip-strip{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid color-mix(in oklab,var(--pri) 30%,transparent);background:color-mix(in oklab,var(--pri) 6%,transparent);border-radius:8px;margin-bottom:14px;flex-wrap:wrap;position:relative}
.chip-lead{color:var(--pri);display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;flex-shrink:0}
.chip-count{margin-left:auto;color:var(--mfg);font-size:12px;flex-shrink:0}
.chip-clear{color:var(--mfg);background:transparent;border:0;font-size:12px;padding:4px 6px;border-radius:4px}
.chip-clear:hover{color:var(--fg);background:var(--sec)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 4px 2px 8px;border-radius:9999px;font-size:11.5px;background:var(--card);border:1px solid var(--bdr);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--fg)}
.pill .pk{color:var(--mfg)}
.pill .px{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:9999px;background:transparent;border:0;color:var(--mfg);cursor:pointer;margin-left:2px}
.pill .px:hover{background:var(--sec);color:var(--fg)}
/* Variation B/C: save button inside chip strip */
.chip-save{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 7px;border-radius:9999px;font-size:11.5px;background:transparent;border:1px dashed var(--pri);color:var(--pri);cursor:pointer;transition:background .12s;flex-shrink:0}
.chip-save:hover{background:color-mix(in oklab,var(--pri) 8%,transparent)}
/* Variation C: right-aligned icon-only */
.chip-save-r{padding:0;width:24px;height:24px;border-radius:5px;justify-content:center;border-style:solid;background:color-mix(in oklab,var(--pri) 6%,transparent)}

/* ── Cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{border:1px solid var(--bdr);background:var(--card);border-radius:8px;padding:14px;display:flex;gap:12px}
.card-fav{width:18px;height:18px;flex-shrink:0;border-radius:3px;background:var(--sec);display:grid;place-items:center;color:var(--mfg);margin-top:2px}
.card-body{flex:1;min-width:0}
.card-title{font-weight:500;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-url{font-size:12px;color:var(--mfg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9999px;font-size:11.5px;background:var(--sec);border:1px solid transparent}

/* ── Save popover (fixed) ── */
.save-pop{position:fixed;z-index:500;width:308px;background:var(--pop);border:1px solid var(--bdr);border-radius:10px;box-shadow:0 20px 56px rgba(0,0,0,.55);padding:15px;animation:popIn .13s ease-out}
@keyframes popIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.sp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sp-hd h3{font-size:13px;font-weight:600}
.sp-query{font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--mfg);background:var(--sec);border:1px solid var(--bdr);border-radius:5px;padding:6px 8px;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-field label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mfg);margin-bottom:5px}
.inp{width:100%;height:32px;padding:0 9px;background:var(--inp);border:1px solid var(--bdr);border-radius:6px;color:var(--fg);font:13px/1 ui-sans-serif,system-ui,sans-serif;outline:0}
.inp:focus{border-color:var(--rng);box-shadow:0 0 0 2px color-mix(in oklab,var(--rng) 18%,transparent)}
.sp-acts{display:flex;justify-content:flex-end;gap:6px;margin-top:11px}
.sp-hint{font-size:12px;color:var(--mfg);line-height:1.5}
.backdrop{position:fixed;inset:0;z-index:499}

/* ── Tweaks ── */
.tweaks{position:fixed;left:16px;bottom:16px;background:var(--pop);border:1px solid var(--bdr);border-radius:10px;padding:12px;width:248px;z-index:9999;box-shadow:0 12px 32px rgba(0,0,0,.5)}
.tweaks b{font-size:12px;display:block;margin-bottom:8px}
.tw-sec{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mfg);margin:10px 0 5px}
.seg{display:flex;border:1px solid var(--bdr);border-radius:5px;overflow:hidden}
.seg button{flex:1;padding:5px 6px;background:transparent;color:var(--mfg);border:0;font-size:11px;border-right:1px solid var(--bdr);line-height:1.3}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--sec);color:var(--fg)}
.tw-note{font-size:11px;color:var(--mfg);margin-top:8px;line-height:1.55}
.tw-note b{display:inline;font-size:inherit}

/* Toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--pop);color:var(--fg);border:1px solid var(--bdr);padding:8px 16px;border-radius:8px;font-size:12.5px;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;gap:8px;animation:toastIn .16s ease-out;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.empty{padding:48px 24px;text-align:center;color:var(--mfg);font-size:13px}
</style>
</head>

<script type="text/babel" data-presets="react">

/* ── Tokenizer ─────────────────────────────────────────────── */
function tokenize(q){
  const tokens=[],re=/(-)?(#([\w-]+)|property:([\w-]+)(=|>=|<=|>|<)([^\s]+)|([a-z]+):([^\s]+)|"([^"]*)"|(\S+))/gi;
  let m;
  while((m=re.exec(q))!==null){
    const neg=!!m[1],raw=m[0];
    if(m[3]!=null) tokens.push({kind:"tag",value:m[3],neg,raw});
    else if(m[4]!=null) tokens.push({kind:"prop",propKey:m[4],op:m[5],propValue:m[6],neg,raw});
    else if(m[7]!=null) tokens.push({kind:"op",key:m[7].toLowerCase(),value:m[8],neg,raw});
    else if(m[9]!=null) tokens.push({kind:"text",value:m[9],neg,raw});
    else tokens.push({kind:"text",value:m[10],neg,raw});
  }
  return tokens;
}
function matches(b,tokens){
  for(const t of tokens){
    let ok=true;
    if(t.kind==="tag") ok=b.tags.some(id=>id.toLowerCase()===t.value.toLowerCase());
    else if(t.kind==="op"&&t.key==="folder") ok=b.folder.toLowerCase().includes(t.value.toLowerCase());
    else if(t.kind==="prop"){
      const bv=String(b.props?.[t.propKey]??"");
      ok=t.op==="="?bv.toLowerCase()===t.propValue.toLowerCase()
        :t.op===">"?Number(bv)>Number(t.propValue)
        :t.op==="<"?Number(bv)<Number(t.propValue):false;
    } else if(t.kind==="text") ok=(b.title+" "+b.url+(b.desc||"")).toLowerCase().includes(t.value.toLowerCase());
    if(t.neg) ok=!ok;
    if(!ok) return false;
  }
  return true;
}

  funnel:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 3H2l8 9.46V19l4 2V12.46L22 3z" fill="currentColor" fillOpacity=".12"/><path d="M22 3H2l8 9.46V19l4 2V12.46L22 3z"/></svg>,

  trash: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
  ellip: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>,
  check: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>,
};

/* ── TokenPill ─────────────────────────────────────────────── */
function TokenPill({t,onRemove}){
  return <span className="pill">
    {t.kind==="tag"&&<span style={{color:"var(--pri)"}}>{ic.hash}</span>}
    {t.kind==="prop"&&<span style={{color:"#a78bfa"}}>{ic.cube}</span>}
    {t.neg&&<span style={{color:"var(--dst)",marginRight:1}}>−</span>}
    {t.kind==="tag"&&t.value}
    {t.kind==="prop"&&<><span className="pk">{t.propKey}</span><span style={{color:"var(--mfg)",margin:"0 1px"}}>{t.op}</span>{t.propValue}</>}
    {t.kind==="op"&&<><span className="pk">{t.key}:</span>{t.value}</>}
    {t.kind==="text"&&`"${t.value}"`}
    <button className="px" onClick={onRemove}>{ic.x}</button>
  </span>;
}

/* ── FilterChips ───────────────────────────────────────────── */
function FilterChips({tokens,count,onRemove,onClear,saveMode,chipSaveRef,onOpenSave}){
  if(!tokens.length) return null;
  return <div className="chip-strip">
    <span className="chip-lead">{ic.search} Filters</span>
    {tokens.map((t,i)=><TokenPill key={i} t={t} onRemove={()=>onRemove(i)}/>)}
    {saveMode==="B"&&
      <button ref={chipSaveRef} className="chip-save" onClick={onOpenSave}>
        {ic.save} Save search
      </button>
    }
    <span className="chip-count">{count} result{count===1?"":"s"}</span>
    <button className="chip-clear" onClick={onClear}>Clear all</button>
    {saveMode==="C"&&
      <button ref={chipSaveRef} className="chip-save chip-save-r" onClick={onOpenSave} title="Save search">
        {ic.save}
      </button>
    }
  </div>;
}

/* ── SavePopover ───────────────────────────────────────────── */
function SavePopover({query,anchorEl,savedSearches,activeSsId,onSave,onUpdate,onClose}){
  const activeSs=savedSearches.find(s=>s.id===activeSsId);
  const isAlreadySaved=activeSs&&activeSs.query.trim()===query.trim();
  const isUpdate=activeSs&&!isAlreadySaved;
  const [name,setName]=useState(activeSs?.name||"");
  const inputRef=useRef(null);
  const [pos,setPos]=useState({top:64,left:180});

  useEffect(()=>{
    if(anchorEl){
      const r=anchorEl.getBoundingClientRect();
      setPos({top:r.bottom+8,left:Math.min(window.innerWidth-320,Math.max(8,r.left+r.width/2-154))});
    }
    if(!isAlreadySaved) setTimeout(()=>inputRef.current?.focus(),60);
    const esc=e=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",esc);
    return()=>document.removeEventListener("keydown",esc);
  },[]);

  function handleSave(){
    if(!name.trim()) return;
    if(isUpdate) onUpdate(activeSs.id,name.trim(),query);
    else onSave(name.trim(),query);
  }

  const title=isAlreadySaved?"Already saved":isUpdate?"Update saved search":"Save search";

  return <>
    <div className="backdrop" onClick={onClose}/>
    <div className="save-pop" style={pos}>
      <div className="sp-hd">
        <h3>{title}</h3>
        <button className="icon-btn" onClick={onClose}>{ic.x}</button>
      </div>
      <div className="sp-query">{query}</div>
      {isAlreadySaved&&<p className="sp-hint">"{activeSs.name}" already saves this exact query.</p>}
      {!isAlreadySaved&&<div className="sp-field">
        <label>Name</label>
        <input ref={inputRef} className="inp" value={name} onChange={e=>setName(e.target.value)}
          placeholder="e.g. Quarkus drafts"
          onKeyDown={e=>{if(e.key==="Enter")handleSave();}}/>
      </div>}
      {isUpdate&&<p className="sp-hint" style={{marginTop:7,fontSize:11}}>
        Saving will update the query for "{activeSs.name}". You can also rename it above.
      </p>}
      <div className="sp-acts">
        <button className="btn-sm" onClick={onClose}>Cancel</button>
        {isAlreadySaved&&<button className="btn-sm pri" onClick={onClose}>OK</button>}
        {!isAlreadySaved&&<button className="btn-sm pri" onClick={handleSave} disabled={!name.trim()}>
          {isUpdate?"Update":"Save"}
        </button>}
      </div>
    </div>
  </>;
}

/* ── SmartCollectionsSection ───────────────────────────────── */
function SmartCollectionsSection({savedSearches,activeSsId,currentQuery,expanded,onToggle,sidebarVariant,onLoad,onRename,onDelete,onAddNew}){
  const [menuId,setMenuId]=useState(null);
  const [renamingId,setRenamingId]=useState(null);
  const [renameVal,setRenameVal]=useState("");

  useEffect(()=>{
    if(!menuId) return;
    const handler=e=>{
      if(!e.target.closest(".sc-menu")) setMenuId(null);
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[menuId]);

  function startRename(ss){setMenuId(null);setRenamingId(ss.id);setRenameVal(ss.name);}
  function commitRename(id){
    if(renameVal.trim()) onRename(id,renameVal.trim());
    setRenamingId(null);
  }

  return <>
    <button className="sc-hd" onClick={onToggle}>
      <span className="sc-hd-lbl">Smart Collections</span>
      {sidebarVariant==="with-add"&&
        <span className="sc-hd-add" title="Save current search"
          onClick={e=>{e.stopPropagation();onAddNew();}}>
          {ic.plus}
        </span>
      }
      <span className={"sc-chev"+(expanded?" open":"")}>{ic.chevD}</span>
    </button>
    <div className={"sc-wrap"+(expanded?"":" shut")}>
      <div className="sc-inner">
        {savedSearches.length===0&&<div className="sc-empty">No saved searches yet</div>}
        {savedSearches.map(ss=>{
          const isActive=ss.id===activeSsId;
          const isRenaming=ss.id===renamingId;
          return <div key={ss.id} className={"s-row"+(isActive?" active":"")}
            onClick={()=>{if(!isRenaming) onLoad(ss);}}>
            <span className="s-ico" style={{color:"#a78bfa"}}>{ic.funnel}</span>
            {isRenaming
              ?<input className="sc-rename" value={renameVal}
                  autoFocus
                  onChange={e=>setRenameVal(e.target.value)}
                  onClick={e=>e.stopPropagation()}
                  onKeyDown={e=>{if(e.key==="Enter")commitRename(ss.id);if(e.key==="Escape")setRenamingId(null);}}
                  onBlur={()=>commitRename(ss.id)}/>
              :<span className="s-lbl">{ss.name}</span>
            }
            {!isRenaming&&<button className="sc-act"
              title="Options"
              onClick={e=>{e.stopPropagation();setMenuId(id=>id===ss.id?null:ss.id);}}>
              {ic.ellip}
            </button>}
            {menuId===ss.id&&<div className="sc-menu" onClick={e=>e.stopPropagation()}>
              <button className="sc-mi" onClick={()=>startRename(ss)}>{ic.pencil} Rename</button>
              <button className="sc-mi red" onClick={()=>{setMenuId(null);onDelete(ss.id);}}>{ic.trash} Delete</button>
            </div>}
          </div>;
        })}
      </div>
    </div>
  </>;
}

/* ── Card ──────────────────────────────────────────────────── */
function Card({b}){
  return <div className="card">
    <div className="card-fav">{ic.globe}</div>
    <div className="card-body">
      <div className="card-title">{b.title}</div>
      <div className="card-url">https://{b.url}</div>
      {b.desc&&<div style={{fontSize:12,color:"var(--mfg)",marginTop:4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{b.desc}</div>}
      <div className="card-meta">
        {b.tags.map(t=><span key={t} className="tag-chip" style={{"--tc":TAGS[t]?.c||"#64748b"}}>
          <span className="tag-dot" style={{background:"var(--tc)"}}/>
          {t}
        </span>)}
      </div>
    </div>
  </div>;
}

/* ── App ───────────────────────────────────────────────────── */
function App(){
  const [query,setQuery]=useState("property:status=draft");
  const [savedSearches,setSavedSearches]=useState(INIT_SAVED);
  const [scExpanded,setScExpanded]=useState(true);
  const [activeSsId,setActiveSsId]=useState(null);
  const [popoverOpen,setPopoverOpen]=useState(false);
  const [popoverAnchorEl,setPopoverAnchorEl]=useState(null);
  const [theme,setTheme]=useState("dark");
  const [saveMode,setSaveMode]=useState("A");        // "A"|"B"
  const [sidebarVariant,setSidebarVariant]=useState("with-add"); // "simple"|"with-add"
  const [toast,setToast]=useState(null);

  const searchShellRef=useRef(null);
  const saveIconRef=useRef(null);
  const chipSaveRef=useRef(null);

  const tokens=useMemo(()=>tokenize(query),[query]);
  const filtered=useMemo(()=>BMS.filter(b=>matches(b,tokens)),[tokens]);

  useEffect(()=>{document.body.classList.toggle("dark",theme==="dark");},[theme]);

  function flash(msg){setToast(msg);setTimeout(()=>setToast(null),1900);}

  function loadSavedSearch(ss){setQuery(ss.query);setActiveSsId(ss.id);}

  function openSavePopover(anchorRef){
    setPopoverAnchorEl(anchorRef?.current||searchShellRef.current);
    setPopoverOpen(true);
  }

  function handleSave(name,q){
    const id="ss"+Date.now();
    setSavedSearches(s=>[...s,{id,name,query:q}]);
    setActiveSsId(id);
    setPopoverOpen(false);
    flash(`Saved "${name}"`);
  }
  function handleUpdate(id,name,q){
    setSavedSearches(s=>s.map(x=>x.id===id?{...x,name,query:q}:x));
    setPopoverOpen(false);
    flash(`Updated "${name}"`);
  }
  function handleRename(id,name){
    setSavedSearches(s=>s.map(x=>x.id===id?{...x,name}:x));
    flash(`Renamed to "${name}"`);
  }
  function handleDelete(id){
    const ss=savedSearches.find(s=>s.id===id);
    setSavedSearches(s=>s.filter(x=>x.id!==id));
    if(activeSsId===id) setActiveSsId(null);
    flash(`Deleted "${ss?.name}"`);
  }
  function removeTokenAt(i){
    setQuery(tokens.filter((_,j)=>j!==i).map(t=>t.raw).join(" ").trim());
  }
  function clearSearch(){setQuery("");setActiveSsId(null);}

  return <>
    <div className="app">
      {/* ── Header ── */}
      <div className="hd">
        <div className="brand">
          <div className="bmark">{ic.bm}</div>
          <button className="coll-btn">My Bookmarks {ic.chevD}</button>
        </div>
        <div className="search-wrap">
          <div className="search-shell" ref={searchShellRef}>
            <div className="search">
              {ic.search}
              <input value={query}
                onChange={e=>{setQuery(e.target.value);}}
                placeholder="Search or load a Smart Collection…"
                spellCheck={false} autoCapitalize="off" autoCorrect="off"/>
              {!query&&<span className="kbd">⌘K</span>}
              {saveMode==="A"&&<button
                ref={saveIconRef}
                className={"save-icon-btn"+(query?" vis":"")}
                title="Save search as Smart Collection"
                onClick={()=>openSavePopover(saveIconRef)}>
                {ic.save}
              </button>}
            </div>
          </div>
        </div>
        <div className="h-acts">
          <button className="btn-pri">{ic.plus} Add</button>
          <button className="btn-ghost">
            <span style={{width:22,height:22,borderRadius:"50%",background:"#a78bfa",display:"grid",placeItems:"center",fontSize:10,fontWeight:700,color:"#fff"}}>A</span>
            Alice {ic.chevD}
          </button>
        </div>
      </div>

      {/* ── Sidebar ── */}
      <aside className="sb">
        <div className="s-row active"><span className="s-ico" style={{color:"var(--pri)"}}>{ic.folder}</span><span className="s-lbl">My Bookmarks</span></div>
        <div style={{paddingLeft:10}}>
          {["vacme-prod","insel","dev","uat","demo","iat"].map(n=>(
            <div key={n} className="s-row"><span className="s-ico" style={{color:"var(--mfg)"}}>{ic.folder}</span><span className="s-lbl">{n}</span></div>
          ))}
        </div>

        <SmartCollectionsSection
          savedSearches={savedSearches}
          activeSsId={activeSsId}
          currentQuery={query}
          expanded={scExpanded}
          onToggle={()=>setScExpanded(e=>!e)}
          sidebarVariant={sidebarVariant}
          onLoad={loadSavedSearch}
          onRename={handleRename}
          onDelete={handleDelete}
          onAddNew={()=>openSavePopover(searchShellRef)}
        />

        <div className="s-head">Tags</div>
        {Object.entries(TAGS).map(([name,{c}])=>(
          <div key={name} className="s-row">
            <span className="s-ico"><span className="tag-dot" style={{background:c}}/></span>
            <span className="s-lbl">{name}</span>
          </div>
        ))}
      </aside>

      {/* ── Main ── */}
      <main className="mn">
        <div className="toolbar">
          <div className="bc">
            <span style={{cursor:"pointer"}}>All Bookmarks</span>
            <span style={{opacity:.5}}>/</span>
            <span style={{fontWeight:500,color:"var(--fg)"}}>vacme-be</span>
          </div>
        </div>
        <div className="content">
          <FilterChips
            tokens={tokens}
            count={filtered.length}
            onRemove={removeTokenAt}
            onClear={clearSearch}
            saveMode={saveMode}
            chipSaveRef={chipSaveRef}
            onOpenSave={()=>openSavePopover(chipSaveRef)}
          />
          {filtered.length===0
            ?<div className="empty">No bookmarks match your search.</div>
            :<div className="grid">{filtered.map(b=><Card key={b.id} b={b}/>)}</div>
          }
        </div>
      </main>
    </div>

    {popoverOpen&&<SavePopover
      query={query}
      anchorEl={popoverAnchorEl}
      savedSearches={savedSearches}
      activeSsId={activeSsId}
      onSave={handleSave}
      onUpdate={handleUpdate}
      onClose={()=>setPopoverOpen(false)}
    />}

    {toast&&<div className="toast">{ic.check} {toast}</div>}

    {/* ── Tweaks ── */}
    <div className="tweaks">
      <b>FR-075/076 Saved Searches</b>

      <div className="tw-sec">Save trigger (FR-075)</div>
      <div className="seg">
        <button className={saveMode==="A"?"on":""} onClick={()=>setSaveMode("A")}>A · search bar icon</button>
        <button className={saveMode==="B"?"on":""} onClick={()=>setSaveMode("B")}>B · strip + label</button>
        <button className={saveMode==="C"?"on":""} onClick={()=>setSaveMode("C")}>C · strip icon only</button>
      </div>

      <div className="tw-sec">Sidebar section header</div>
      <div className="seg">
        <button className={sidebarVariant==="simple"?"on":""} onClick={()=>setSidebarVariant("simple")}>Simple collapse</button>
        <button className={sidebarVariant==="with-add"?"on":""} onClick={()=>setSidebarVariant("with-add")}>With + on hover</button>
      </div>

      <div className="tw-sec">Theme</div>
      <div className="seg">
        <button className={theme==="light"?"on":""} onClick={()=>setTheme("light")}>Light</button>
        <button className={theme==="dark"?"on":""} onClick={()=>setTheme("dark")}>Dark</button>
      </div>

      <p className="tw-note">
        <b>Try the flow:</b> click a Smart Collection → modifies the search bar → tweak the query → hit the save icon to <em>update</em> or save as new. Hover a row for rename / delete.
      </p>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
