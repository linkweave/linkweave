<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Chainlink — UC-067 Properties</title>
<style>
.dark{--color-background:#14161a;--color-foreground:#ededed;--color-card:#1e2028;--color-primary:#3b82f6;--color-secondary:#252a32;--color-muted:#252a32;--color-muted-foreground:#a3a3a3;--color-accent:#252a32;--color-accent-foreground:#ededed;--color-destructive:#dc2626;--color-popover:#22262f;--color-popover-hover:#363d4b;--color-border:#363d49;--color-input:#252a32;--color-ring:#3b82f6}
:root{--color-background:#f9fafb;--color-foreground:#111827;--color-card:#ffffff;--color-primary:#2563eb;--color-secondary:#f3f4f6;--color-muted:#f3f4f6;--color-muted-foreground:#6b7280;--color-accent:#f3f4f6;--color-accent-foreground:#111827;--color-destructive:#ef4444;--color-popover:#ffffff;--color-popover-hover:#f3f4f6;--color-border:#e5e7eb;--color-input:#e5e7eb;--color-ring:#2563eb}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-background);color:var(--color-foreground);font:14px/1.5 ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;cursor:pointer} a{color:inherit;text-decoration:none}

/* ── Layout ─────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:52px 1fr;height:100vh;grid-template-areas:"head head" "side main"}
.header{grid-area:head;border-bottom:1px solid var(--color-border);background:var(--color-card);display:flex;align-items:center;padding:0 16px;gap:16px}
.brand{display:flex;align-items:center;gap:8px;width:220px;margin-left:-16px;padding-left:16px;flex-shrink:0}
.brand-mark{width:24px;height:24px;border-radius:6px;background:var(--color-primary);display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.coll-btn{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;font-weight:600;font-size:13.5px;background:transparent;border:0}
.coll-btn:hover{background:var(--color-secondary)}
.search-wrap{flex:1;display:flex;justify-content:center}
.search-shell{position:relative;width:min(520px,100%)}
.search{display:flex;align-items:center;gap:8px;width:100%;height:32px;padding:0 8px 0 10px;background:var(--color-input);border:1px solid var(--color-border);border-radius:6px;color:var(--color-muted-foreground)}
.search:focus-within{border-color:var(--color-ring);box-shadow:0 0 0 3px color-mix(in oklab,var(--color-ring) 20%,transparent)}
.search input{flex:1;background:transparent;border:0;outline:0;color:var(--color-foreground);font:13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;min-width:0}
.search input::placeholder{color:var(--color-muted-foreground);font-family:ui-sans-serif,system-ui,sans-serif}
.kbd{padding:1px 5px;font-size:10px;color:var(--color-muted-foreground);background:var(--color-card);border:1px solid var(--color-border);border-radius:4px}
.h-actions{display:flex;align-items:center;gap:6px}
.btn-pri{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;background:var(--color-primary);color:#fff;border:0;border-radius:6px;font-weight:500;font-size:13px}
.btn-pri:hover{filter:brightness(1.08)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 8px;background:transparent;border:0;border-radius:6px;font-size:13px}
.btn-ghost:hover{background:var(--color-secondary)}

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar{grid-area:side;border-right:1px solid var(--color-border);background:var(--color-background);overflow-y:auto;padding:10px 8px}
.s-row{display:flex;align-items:center;gap:8px;height:28px;padding:0 8px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--color-foreground)}
.s-row:hover{background:var(--color-secondary)}
.s-row.active{background:var(--color-secondary)}
.s-ico{color:var(--color-primary);display:inline-flex;flex-shrink:0}
.s-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-cnt{color:var(--color-muted-foreground);font-size:11px;font-variant-numeric:tabular-nums}
.s-head{padding:14px 8px 4px;color:var(--color-muted-foreground);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tag-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── Main / Toolbar ──────────────────────────────────────────── */
.main{grid-area:main;overflow-y:auto;background:var(--color-background);position:relative}
.toolbar{position:sticky;top:0;z-index:30;height:44px;display:flex;align-items:center;padding:0 20px;gap:10px;background:color-mix(in oklab,var(--color-background) 88%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--color-border)}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-muted-foreground);flex:1;min-width:0;overflow:hidden}
.bc .crumb{padding:2px 4px;border-radius:4px;cursor:pointer;white-space:nowrap}
.bc .crumb:hover{color:var(--color-foreground);background:var(--color-secondary)}
.bc .sep{color:var(--color-muted-foreground)}
.bc .current{color:var(--color-foreground);font-weight:500;padding:2px 4px;white-space:nowrap}
.tb-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tb-btn{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;background:transparent;border:1px solid var(--color-border);border-radius:6px;font-size:12px;font-weight:500;color:var(--color-foreground)}
.tb-btn:hover{background:var(--color-secondary)}
.tb-btn.icon-only{padding:0;width:28px;justify-content:center}
.tb-divider{width:1px;height:16px;background:var(--color-border);margin:0 2px}
.seg{display:inline-flex;border:1px solid var(--color-border);border-radius:6px;overflow:hidden}
.seg button{height:28px;width:28px;display:grid;place-items:center;background:transparent;color:var(--color-muted-foreground);border:0;border-right:1px solid var(--color-border)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--color-secondary);color:var(--color-foreground)}

/* ── Collection Settings Modal ───────────────────────────────── */
.settings-anchor{position:relative}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:400;display:grid;place-items:center;padding:16px}
.dialog{width:min(560px,100%);background:var(--color-card);border:1px solid var(--color-border);border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;max-height:calc(100vh - 48px)}
.d-head{padding:18px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.d-head h2{font-size:15px;font-weight:600;margin-bottom:2px}
.d-head p{font-size:12px;color:var(--color-muted-foreground)}
.d-tabs{display:flex;border-bottom:1px solid var(--color-border);padding:0 22px;flex-shrink:0;margin-top:14px}
.d-tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--color-muted-foreground);background:transparent;border:0;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
.d-tab:hover{color:var(--color-foreground)}
.d-tab.on{color:var(--color-foreground);border-bottom-color:var(--color-primary)}
.d-body{flex:1;overflow-y:auto;padding:20px 22px}
.d-foot{padding:14px 22px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.sp-section{margin-bottom:20px}
.sp-section:last-child{margin-bottom:0}
.sp-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:8px}
.sp-hint{font-size:11.5px;color:var(--color-muted-foreground);margin-top:6px;line-height:1.5}

/* Toggle row */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 10px;border-radius:7px;background:color-mix(in oklab,var(--color-secondary) 60%,transparent)}
.toggle-row-text .name{font-size:13px;font-weight:500;color:var(--color-foreground)}
.toggle-row-text .desc{font-size:11.5px;color:var(--color-muted-foreground);margin-top:1px}
.toggle{position:relative;width:34px;height:19px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--color-border);border-radius:9999px;cursor:pointer;transition:background .15s}
.toggle input:checked ~ .toggle-track{background:var(--color-primary)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .15s;pointer-events:none;z-index:1}
.toggle input:checked ~ .toggle-thumb{transform:translateX(15px)}

/* Layout seg in panel */
.layout-seg{display:flex;gap:6px}
.layout-opt{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 6px;border-radius:7px;border:1px solid var(--color-border);background:transparent;font-size:11px;color:var(--color-muted-foreground);cursor:pointer;transition:all .12s}
.layout-opt:hover{border-color:var(--color-primary);color:var(--color-foreground)}
.layout-opt.on{border-color:var(--color-primary);background:color-mix(in oklab,var(--color-primary) 10%,var(--color-secondary));color:var(--color-primary)}

/* Property definition rows in panel */
.prop-def-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid color-mix(in oklab,var(--color-border) 50%,transparent)}
.prop-def-row:last-child{border-bottom:0}
.prop-def-name{font-size:12.5px;font-weight:500;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;flex:1;color:var(--color-foreground)}
.type-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:var(--color-secondary);color:var(--color-muted-foreground);border:1px solid var(--color-border);text-transform:uppercase;letter-spacing:.04em}
.prop-def-opts{font-size:11px;color:var(--color-muted-foreground);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.icon-btn{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:5px;background:transparent;border:0;color:var(--color-muted-foreground)}
.icon-btn:hover{background:var(--color-secondary);color:var(--color-foreground)}
.icon-btn.danger:hover{background:color-mix(in oklab,var(--color-destructive) 10%,var(--color-secondary));color:var(--color-destructive)}

/* Add/edit form inside panel */
.add-form{background:color-mix(in oklab,var(--color-primary) 5%,var(--color-background));border:1px dashed color-mix(in oklab,var(--color-primary) 30%,var(--color-border));border-radius:8px;padding:12px;margin-top:10px}
.add-form-title{font-size:11.5px;font-weight:600;color:var(--color-foreground);margin-bottom:10px}
.field{margin-bottom:11px}
.field label{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:5px}
.inp{width:100%;height:32px;padding:0 9px;background:var(--color-input);border:1px solid var(--color-border);border-radius:6px;color:var(--color-foreground);font:inherit;font-size:12.5px;outline:0}
.inp:focus{border-color:var(--color-ring);box-shadow:0 0 0 2px color-mix(in oklab,var(--color-ring) 18%,transparent)}
select.inp{cursor:pointer}
.type-grid{display:flex;flex-wrap:wrap;gap:5px}
.type-opt{padding:3px 9px;border-radius:5px;border:1px solid var(--color-border);background:var(--color-secondary);color:var(--color-muted-foreground);font-size:11.5px;cursor:pointer;transition:all .1s}
.type-opt:hover{border-color:var(--color-primary);color:var(--color-foreground)}
.type-opt.on{background:color-mix(in oklab,var(--color-primary) 12%,var(--color-secondary));border-color:var(--color-primary);color:var(--color-primary)}
.form-actions{display:flex;gap:6px;margin-top:8px}
.btn-sm{display:inline-flex;align-items:center;gap:4px;height:27px;padding:0 10px;border-radius:5px;font-size:12px;font-weight:500;border:1px solid var(--color-border);background:transparent;color:var(--color-foreground)}
.btn-sm:hover{background:var(--color-secondary)}
.btn-sm.pri{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.btn-sm.pri:hover{filter:brightness(1.08)}
.add-prop-btn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--color-primary);background:transparent;border:0;cursor:pointer;padding:4px 0;margin-top:6px}
.add-prop-btn:hover{opacity:.8}

/* ── Content / Cards ─────────────────────────────────────────── */
.content{padding:16px 20px 80px;max-width:1240px;margin:0 auto}
.chip-strip{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid color-mix(in oklab,var(--color-primary) 30%,transparent);background:color-mix(in oklab,var(--color-primary) 6%,transparent);border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
.chip-strip .lead{color:var(--color-primary);display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 4px 2px 8px;border-radius:9999px;font-size:11.5px;background:var(--color-card);border:1px solid var(--color-border);color:var(--color-foreground);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.pill.neg{border-color:color-mix(in oklab,var(--color-destructive) 40%,var(--color-border));background:color-mix(in oklab,var(--color-destructive) 6%,var(--color-card))}
.pill.property .pill-ico{color:#a78bfa}
.pill.tag .pill-ico{color:var(--tag-color,var(--color-primary))}
.pill .pill-key{color:var(--color-muted-foreground)}
.pill .x{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:9999px;background:transparent;border:0;color:var(--color-muted-foreground);cursor:pointer;margin-left:2px}
.pill .x:hover{background:var(--color-secondary);color:var(--color-foreground)}
.chip-strip .count{margin-left:auto;color:var(--color-muted-foreground);font-size:12px;flex-shrink:0}
.chip-strip .clear-all{color:var(--color-muted-foreground);background:transparent;border:0;font-size:12px;padding:4px 6px;border-radius:4px}
.chip-strip .clear-all:hover{color:var(--color-foreground);background:var(--color-secondary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* Card */
.card{position:relative;border:1px solid var(--color-border);background:var(--color-card);border-radius:8px;padding:14px;transition:border-color .14s,box-shadow .14s}
.card:hover{border-color:color-mix(in oklab,var(--color-primary) 35%,var(--color-border));box-shadow:0 0 0 2px color-mix(in oklab,var(--color-primary) 22%,transparent)}
.stretched{position:absolute;inset:0;border-radius:inherit;z-index:0;outline:0}
.card-inner{position:relative;display:flex;gap:12px;align-items:flex-start;pointer-events:none}
.card-inner .clickable{pointer-events:auto;position:relative;z-index:1}
.fav{width:18px;height:18px;flex-shrink:0;border-radius:3px;background:var(--color-secondary);display:grid;place-items:center;color:var(--color-muted-foreground);margin-top:1px}
.body{flex:1;min-width:0}
.row1{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.title{font-weight:500;font-size:14px;color:var(--color-foreground);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.kebab{margin-left:auto;height:26px;width:26px;flex-shrink:0;display:inline-grid;place-items:center;border-radius:6px;color:var(--color-muted-foreground);background:transparent;border:0;opacity:0;transition:opacity .12s}
.card:hover .kebab{opacity:1}
.kebab:hover{background:var(--color-accent);color:var(--color-accent-foreground)}
.url-row{display:flex;align-items:center;gap:4px;color:var(--color-muted-foreground);font-size:12.5px}
.url-row span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.meta-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:9px}
.in-folder{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--color-muted-foreground);padding:2px 8px 2px 6px;border-radius:9999px;background:transparent;border:1px dashed var(--color-border);transition:border-color .12s,color .12s,background .12s}
.in-folder:hover{color:var(--color-foreground);border-color:var(--color-foreground);background:var(--color-secondary)}
.in-folder.active{color:var(--color-foreground);border-style:solid;border-color:var(--color-foreground);background:var(--color-secondary)}
.tag-chip{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:9999px;font-size:11.5px;background:var(--color-secondary);color:var(--color-foreground);border:1px solid transparent;transition:border-color .12s,background .12s}
.tag-chip .dot{width:7px;height:7px;border-radius:2px;background:var(--tag-color,var(--color-muted-foreground));flex-shrink:0}
.tag-chip:hover{border-color:var(--tag-color,var(--color-border));background:color-mix(in oklab,var(--tag-color,var(--color-secondary)) 12%,var(--color-secondary))}
.tag-chip.active{background:color-mix(in oklab,var(--tag-color) 18%,var(--color-secondary));border-color:var(--tag-color)}
.tag-chip.excluded{opacity:.6;text-decoration:line-through;border-style:dashed}
.prop-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;padding-top:7px;border-top:1px solid color-mix(in oklab,var(--color-border) 45%,transparent)}
.prop-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;background:var(--color-secondary);border:1px solid var(--color-border);cursor:pointer;transition:border-color .12s,background .12s}
.prop-chip .pk{color:var(--color-muted-foreground);margin-right:3px}
.prop-chip .pv{color:var(--color-foreground);font-weight:500}
.prop-chip.active{border-color:color-mix(in oklab,#a78bfa 50%,var(--color-border));background:color-mix(in oklab,#a78bfa 10%,var(--color-secondary))}
.prop-chip.bool-t{border-color:color-mix(in oklab,#22c55e 35%,var(--color-border));background:color-mix(in oklab,#22c55e 7%,var(--color-secondary))}
.prop-chip.bool-t .pv{color:#4ade80}
.prop-chip:hover{border-color:color-mix(in oklab,#a78bfa 45%,var(--color-border));background:color-mix(in oklab,#a78bfa 9%,var(--color-secondary))}

/* Edit Bookmark Dialog */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:grid;place-items:center;padding:16px}
.modal{background:var(--color-card);border:1px solid var(--color-border);border-radius:12px;width:min(600px,100%);max-height:calc(100vh - 48px);display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--color-border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.modal-head h2{font-size:15px;font-weight:600}
.modal-head .sub{font-size:11.5px;color:var(--color-muted-foreground);margin-top:2px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.modal-body{flex:1;overflow-y:auto;padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.modal-tabs{display:flex;border-bottom:1px solid var(--color-border);margin:-20px -22px 18px;padding:0 22px}
.modal-tab{padding:10px 14px;font-size:13px;color:var(--color-muted-foreground);border:0;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
.modal-tab:hover{color:var(--color-foreground)}
.modal-tab.on{color:var(--color-foreground);font-weight:500;border-bottom-color:var(--color-primary)}
.field-full{margin-bottom:13px}
.field-full label{display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted-foreground);margin-bottom:5px}
.inp-full{width:100%;height:33px;padding:0 10px;background:var(--color-input);border:1px solid var(--color-border);border-radius:6px;color:var(--color-foreground);font:inherit;font-size:13px;outline:0}
.inp-full:focus{border-color:var(--color-ring);box-shadow:0 0 0 2px color-mix(in oklab,var(--color-ring) 18%,transparent)}
select.inp-full{cursor:pointer}
.inp-row-2{display:flex;gap:10px}
.inp-row-2 .field-full{flex:1;margin-bottom:0}
.toggle-row-modal{display:flex;align-items:center;gap:10px}

/* Toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--color-popover);color:var(--color-foreground);border:1px solid var(--color-border);padding:8px 16px;border-radius:8px;font-size:12.5px;box-shadow:0 16px 40px rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;gap:8px;animation:toastIn .16s ease-out;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.empty{padding:48px 24px;text-align:center;color:var(--color-muted-foreground);font-size:13px}

/* Tweaks */
.tweaks{position:fixed;left:16px;bottom:16px;background:var(--color-popover);border:1px solid var(--color-border);border-radius:10px;padding:12px;width:230px;z-index:9999;box-shadow:0 12px 32px rgba(0,0,0,.5)}
.tweaks b{display:block;margin-bottom:8px;font-size:12px}
.tweaks .sec{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted-foreground);margin:10px 0 5px}
.tweaks .seg2{display:flex;border:1px solid var(--color-border);border-radius:5px;overflow:hidden}

/* ── Tokenizer ────────────────────────────────────────────────── */
function tokenize(q){
  const tokens=[];
  const re=/(-)?(#"([^"]*)"|#([\w-]+)|property:([\w-]+)(=|>=|<=|>|<)([^\s]+)|([a-z]+):"([^"]*)"|([a-z]+):([^\s]+)|"([^"]*)"|(\S+))/gi;
  let m;
  while((m=re.exec(q))!==null){
    const neg=!!m[1];
    if(m[3]!=null||m[4]!=null) tokens.push({kind:"tag",value:m[3]??m[4],neg,raw:m[0]});
    else if(m[5]!=null) tokens.push({kind:"property",propKey:m[5],op:m[6],propValue:m[7],neg,raw:m[0]});
    else if(m[8]&&m[9]!=null) tokens.push({kind:"op",key:m[8].toLowerCase(),value:m[9],neg,raw:m[0]});
    else if(m[10]&&m[11]!=null) tokens.push({kind:"op",key:m[10].toLowerCase(),value:m[11],neg,raw:m[0]});
    else if(m[12]!=null) tokens.push({kind:"text",value:m[12],neg,raw:m[0]});
    else tokens.push({kind:"text",value:m[13],neg,raw:m[0]});
  }
  return tokens;
}
function quoteIfNeeded(s){return /\s/.test(s)?`"${s}"`:s;}
function tokenToString(t){
  const p=t.neg?"-":"";
  if(t.kind==="tag") return `${p}#${quoteIfNeeded(t.value)}`;
  if(t.kind==="property") return `${p}property:${t.propKey}${t.op}${quoteIfNeeded(t.propValue)}`;
  if(t.kind==="op") return `${p}${t.key}:${quoteIfNeeded(t.value)}`;
  return `${p}${quoteIfNeeded(t.value)}`;
}
function stringify(ts){return ts.map(tokenToString).join(" ");}
function matches(b,tokens){
  for(const t of tokens){
    let ok=true;
    if(t.kind==="tag") ok=b.tags.some(id=>id.toLowerCase()===t.value.toLowerCase());
    else if(t.kind==="op"&&t.key==="folder") ok=b.folder.toLowerCase().includes(t.value.toLowerCase());
    else if(t.kind==="property"){
      const bv=String(b.props?.[t.propKey]??"");
      if(t.op==="=") ok=bv.toLowerCase()===t.propValue.toLowerCase();
      else if(t.op===">") ok=Number(bv)>Number(t.propValue);
      else if(t.op==="<") ok=Number(bv)<Number(t.propValue);
      else if(t.op===">=") ok=Number(bv)>=Number(t.propValue);
      else if(t.op==="<=") ok=Number(bv)<=Number(t.propValue);
    } else if(t.kind==="text") ok=(b.title+" "+b.url+(b.desc||"")).toLowerCase().includes(t.value.toLowerCase());
    if(t.neg) ok=!ok;
    if(!ok) return false;
  }
  return true;
}
function sameKey(x,t){
  if(t.kind==="property") return x.kind==="property"&&x.propKey===t.propKey;
  return x.kind===t.kind&&(x.value||"").toLowerCase()===(t.value||"").toLowerCase()&&(x.key||"")===(t.key||"");
}
function isActive(tokens,t){
  if(t.kind==="property") return tokens.some(x=>x.kind==="property"&&x.propKey===t.propKey&&x.op===t.op&&x.propValue===t.propValue&&!x.neg);
  return tokens.some(x=>sameKey(x,t)&&!x.neg);
}
function toggleToken(tokens,t){
  const already=tokens.some(x=>sameKey(x,t)&&(t.kind==="property"?x.propValue===t.propValue&&x.op===t.op:true));
  if(already) return tokens.filter(x=>!sameKey(x,t));
  return [...tokens.filter(x=>!sameKey(x,t)), {...t,neg:false}];
}

/* ── Toggle component ────────────────────────────────────────── */
function Toggle({checked, onChange}){
  return <label className="toggle">
    <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>
    <div className="toggle-track"/>
    <div className="toggle-thumb"/>
  </label>;
}

/* ── FilterChips ─────────────────────────────────────────────── */
function FilterChips({tokens,count,onRemove,onClear}){
  if(!tokens.length) return null;
  return <div className="chip-strip">
    <span className="lead">{I.search} Filters</span>
    {tokens.map((t,i)=><TokenPill key={i} t={t} onRemove={()=>onRemove(i)}/>)}
    <span className="count">{count} result{count===1?"":"s"}</span>
    <button className="clear-all" onClick={onClear}>Clear all</button>
  </div>;
}
function TokenPill({t,onRemove}){
  let inner,cls="pill "+t.kind+(t.neg?" neg":""),sty={};
  if(t.kind==="tag"){
    const td=TAGS[t.value.toLowerCase()]; sty={"--tag-color":td?.color||"var(--color-primary)"};
    inner=<><span className="pill-ico">{I.hash}</span>{t.value}</>;
  } else if(t.kind==="property"){
    inner=<><span className="pill-ico">{I.cube}</span><span className="pill-key">{t.propKey}</span><span style={{color:"var(--color-muted-foreground)",margin:"0 2px"}}>{t.op}</span>{t.propValue}</>;
  } else if(t.kind==="op"&&t.key==="folder"){
    inner=<><span className="pill-ico">{I.folder}</span><span className="pill-key">folder:</span>{t.value}</>;
  } else if(t.kind==="op"){
    inner=<><span className="pill-key">{t.key}:</span>{t.value}</>;
  } else {
    inner=<>"{t.value}"</>;
  }
  return <span className={cls} style={sty}>
    {t.neg&&<span className="pill-ico">−</span>}{inner}
    <button className="x" onClick={onRemove}>{I.x}</button>
  </span>;
}

/* ── PropChip ────────────────────────────────────────────────── */
function PropChip({propDef,value,active,onClick}){
  if(value===undefined||value===null||value==="") return null;
  let cls="prop-chip clickable";
  if(active) cls+=" active";
  let dv=String(value);
  if(propDef.type==="boolean") cls+=value===true||value==="true"?" bool-t":"";
  if(propDef.type==="boolean") dv=value===true||value==="true"?"true":"false";
  if(propDef.type==="date"&&dv) try{dv=new Date(dv).toLocaleDateString("en-CH",{day:"numeric",month:"short"});}catch(e){}
  return <button className={cls} onClick={onClick} title={`Filter by ${propDef.name}=${value}`}>
    <span className="pk">{propDef.name}</span>
    <span style={{color:"var(--color-muted-foreground)",margin:"0 2px"}}>=</span>
    <span className="pv">{dv}</span>
  </button>;
}

/* ── BookmarkCard ────────────────────────────────────────────── */
function Card({b,tokens,propDefs,onToggleToken,onEdit,showProps}){
  const tagActive=(t)=>isActive(tokens,{kind:"tag",value:t,neg:false});
  const tagExcl=(t)=>isActive(tokens,{kind:"tag",value:t,neg:true});
  const folderActive=()=>isActive(tokens,{kind:"op",key:"folder",value:b.folder,neg:false});
  const propActive=(k,v)=>isActive(tokens,{kind:"property",propKey:k,op:"=",propValue:String(v),neg:false});
  const visibleProps=showProps?propDefs.filter(pd=>b.props?.[pd.name]!==undefined&&b.props?.[pd.name]!==null&&b.props?.[pd.name]!==""):[];
  return <div className="card">
    <a className="stretched" href={"https://"+b.url} target="_blank" rel="noopener noreferrer" aria-label={b.title} onClick={e=>e.preventDefault()}/>
    <div className="card-inner">
      <span className="fav">{I.globe}</span>
      <div className="body">
        <div className="row1">
          <span className="title">{b.title}</span>
          <button className="kebab clickable" onClick={e=>{e.preventDefault();e.stopPropagation();onEdit(b);}}>{I.ellipsis}</button>
        </div>
        <div className="url-row"><span>https://{b.url}</span><span style={{opacity:.5,flexShrink:0,marginLeft:2}}>{I.ext}</span></div>
        {b.desc&&<p style={{fontSize:12,color:"var(--color-muted-foreground)",marginTop:5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{b.desc}</p>}
        <div className="meta-row">
          <button className={"in-folder clickable"+(folderActive()?" active":"")} onClick={e=>{e.preventDefault();e.stopPropagation();onToggleToken({kind:"op",key:"folder",value:b.folder,neg:false});}}>
            {I.folder}<span>in {b.folder}</span>
          </button>
          {b.tags.map(tag=>{
            const td=TAGS[tag];
            return <button key={tag}
              className={"tag-chip clickable"+(tagActive(tag)?" active":"")+(tagExcl(tag)?" excluded":"")}
              style={{"--tag-color":td?.color||"#64748b"}}
              onClick={e=>{e.preventDefault();e.stopPropagation();onToggleToken({kind:"tag",value:tag,neg:false});}}>
              <span className="dot"/>{tag}
            </button>;
          })}
        </div>
        {visibleProps.length>0&&<div className="prop-row">
          {visibleProps.map(pd=><PropChip key={pd.name} propDef={pd} value={b.props[pd.name]}
            active={propActive(pd.name,b.props[pd.name])}
            onClick={e=>{e.preventDefault();e.stopPropagation();onToggleToken({kind:"property",propKey:pd.name,op:"=",propValue:String(b.props[pd.name]),neg:false});}}/>)}
        </div>}
      </div>
    </div>
  </div>;
}

        {tab==="props"&&<>
          <div className="sp-section">
            <p className="sp-hint" style={{marginBottom:14}}>Custom fields available on every bookmark in this collection. Use <code style={{fontSize:10.5,background:"var(--color-secondary)",padding:"1px 5px",borderRadius:3,color:"var(--color-foreground)"}}>property:name=value</code> in search to filter, or click a badge on any card.</p>
            {localDefs.length===0&&!adding&&<p style={{color:"var(--color-muted-foreground)",fontSize:13,padding:"6px 0"}}>No properties yet — add one below.</p>}
            {localDefs.map(def=><div className="prop-def-row" key={def.id}>
              <span className="prop-def-name">{def.name}</span>
              <span className="type-badge">{def.type}</span>
              {(def.options||[]).length>0&&<span className="prop-def-opts">{def.options.join(" · ")}</span>}
              <button className="icon-btn" onClick={()=>startEdit(def)} title="Edit">{I.edit}</button>
              <button className="icon-btn danger" onClick={()=>setLocalDefs(d=>d.filter(x=>x.id!==def.id))} title="Delete">{I.trash}</button>
            </div>)}
            {adding&&<div className="add-form">
              <div className="add-form-title">{editingId?"Edit property":"New property"}</div>
              <div className="field">
                <label>Name</label>
                <input className="inp" placeholder="e.g. status, priority, due…" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} autoFocus/>
              </div>
              <div className="field">
                <label>Type</label>
                <div className="type-grid">{TYPES.map(t=><button key={t} className={"type-opt"+(form.type===t?" on":"")} onClick={()=>setForm(f=>({...f,type:t}))}>{t}</button>)}</div>
              </div>
              {(form.type==="select"||form.type==="multi-select")&&<div className="field">
                <label>Options <span style={{textTransform:"none",letterSpacing:0,fontWeight:400}}>(comma-separated)</span></label>
                <input className="inp" placeholder="draft, review, published" value={form.optStr} onChange={e=>setForm(f=>({...f,optStr:e.target.value}))}/>
              </div>}
              <div className="form-actions">
                <button className="btn-sm pri" onClick={saveForm}>{editingId?"Save changes":"Add property"}</button>
                <button className="btn-sm" onClick={cancelForm}>Cancel</button>
              </div>
            </div>}
            {!adding&&<button className="add-prop-btn" onClick={startAdd}>{I.plus} Add property</button>}
          </div>
        </>}
      </div>

      <div className="d-foot">
        <button className="btn-sm" onClick={onClose}>Cancel</button>
        {tab==="props"
          ? <button className="btn-sm pri" onClick={saveAll}>Save properties</button>
          : <button className="btn-sm pri" onClick={onClose}>Done</button>
        }
      </div>
    </div>
  </div>;
}

/* ── Edit Bookmark Dialog (no tabs — properties inline) ──────── */
function EditBookmarkDialog({bookmark,propDefs,onClose}){
  const [props,setProps]=useState({...bookmark?.props});
  function setProp(k,v){setProps(p=>({...p,[k]:v}));}
  function clearProp(k){setProps(p=>{const n={...p};delete n[k];return n;});}
  return <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal">
      <div className="modal-head">
        <div><h2 style={{display:"flex",alignItems:"center",gap:6}}>{I.edit} Edit bookmark</h2><div className="sub">{bookmark?.url}</div></div>
        <button className="icon-btn" onClick={onClose} style={{width:28,height:28}}>{I.x}</button>
      </div>
      <div className="modal-body">
        <div className="field-full"><label>Title</label><input className="inp-full" defaultValue={bookmark?.title}/></div>
        <div className="field-full"><label>URL</label><input className="inp-full" defaultValue={"https://"+bookmark?.url}/></div>
        <div className="field-full"><label>Description</label><textarea className="inp-full" rows={3} style={{height:"auto",padding:"8px 10px",resize:"vertical"}} defaultValue={bookmark?.desc||""}/></div>
        <div className="inp-row-2">
          <div className="field-full"><label>Folder</label><input className="inp-full" defaultValue={bookmark?.folder}/></div>
          <div className="field-full"><label>Tags</label><input className="inp-full" defaultValue={(bookmark?.tags||[]).map(t=>"#"+t).join(" ")}/></div>
        </div>
        {propDefs.length>0&&<>
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"18px 0 14px"}}>
            <span style={{fontSize:11,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"var(--color-muted-foreground)",display:"flex",alignItems:"center",gap:5}}>{I.cube} Properties</span>
            <div style={{flex:1,height:1,background:"var(--color-border)"}}/>
          </div>
          {propDefs.map(pd=><PropertyInput key={pd.name} propDef={pd} value={props[pd.name]} onChange={v=>setProp(pd.name,v)} onClear={()=>clearProp(pd.name)}/>)}
        </>}
      </div>
      <div className="modal-foot">
        <button className="btn-sm" onClick={onClose}>Cancel</button>
        <button className="btn-sm pri" onClick={onClose}>Save</button>
      </div>
    </div>
  </div>;
}
function PropertyInput({propDef,value,onChange,onClear}){
  const has=value!==undefined&&value!=="";
  return <div className="field-full">
    <label>
      <span style={{display:"flex",alignItems:"center",gap:6}}>{propDef.name}<span className="type-badge">{propDef.type}</span></span>
      {has&&<button style={{fontSize:11,color:"var(--color-muted-foreground)",background:"transparent",border:0,cursor:"pointer",textTransform:"none",letterSpacing:0,fontWeight:400}} onClick={onClear}>Clear</button>}
    </label>
    {propDef.type==="text"&&<input className="inp-full" value={value||""} placeholder={`Enter ${propDef.name}…`} onChange={e=>onChange(e.target.value)}/>}
    {propDef.type==="number"&&<input className="inp-full" type="number" value={value||""} placeholder="0" onChange={e=>onChange(Number(e.target.value))}/>}
    {propDef.type==="date"&&<input className="inp-full" type="date" value={value||""} onChange={e=>onChange(e.target.value)}/>}
    {propDef.type==="boolean"&&<div className="toggle-row-modal"><Toggle checked={!!value} onChange={v=>onChange(v)}/><span style={{fontSize:13,color:value?"var(--color-foreground)":"var(--color-muted-foreground)",marginLeft:6}}>{value?"Yes":"No"}</span></div>}
    {(propDef.type==="select"||propDef.type==="multi-select")&&<select className="inp-full" value={value||""} onChange={e=>onChange(e.target.value)}>
      <option value="">— not set —</option>
      {(propDef.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
    </select>}
  </div>;
}

/* ── App ─────────────────────────────────────────────────────── */
function App(){
  const [query,setQuery]=useState("");
  const [propDefs,setPropDefs]=useState(INIT_PROP_DEFS);
  const [showProps,setShowProps]=useState(()=>localStorage.getItem("cl:showProps")==="true");
  const [showPropsSidebar,setShowPropsSidebar]=useState(()=>localStorage.getItem("cl:showPropsSidebar")!=="false");
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [layout,setLayout]=useState("grid");
  const [editingBm,setEditingBm]=useState(null);
  const [theme,setTheme]=useState("dark");
  const [toast,setToast]=useState(null);
  const inputRef=useRef(null);

  const tokens=useMemo(()=>tokenize(query),[query]);
  const filtered=useMemo(()=>BOOKMARKS.filter(b=>matches(b,tokens)),[tokens]);

  useEffect(()=>{document.body.classList.toggle("dark",theme==="dark");},[theme]);

  function setTokens(ts){setQuery(stringify(ts));}
  function onToggleToken(t){setTokens(toggleToken(tokens,t));}
  function onRemoveAt(i){setTokens(tokens.filter((_,j)=>j!==i));}
  function toggleShowProps(v){setShowProps(v);localStorage.setItem("cl:showProps",String(v));}
  function toggleShowPropsSidebar(v){setShowPropsSidebar(v);localStorage.setItem("cl:showPropsSidebar",String(v));}
  function flash(msg){setToast(msg);setTimeout(()=>setToast(null),1600);}

  return <>
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="brand">
          <div className="brand-mark">{I.bm}</div>
          <button className="coll-btn">My Bookmarks {I.chevD}</button>
        </div>
        <div className="search-wrap">
          <div className="search-shell">
            <label className="search">
              {I.search}
              <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
                placeholder="Search… try property:status=draft or property:priority>3"
                spellCheck={false} autoCapitalize="off" autoCorrect="off"/>
              {!query&&<span className="kbd">⌘K</span>}
            </label>
          </div>
        </div>
        <div className="h-actions">
          <button className="btn-pri">{I.plus} Add Bookmark</button>
          <button className="btn-ghost">
            <span style={{width:22,height:22,borderRadius:"50%",background:"#a78bfa",display:"grid",placeItems:"center",fontSize:10,fontWeight:700,color:"#fff"}}>A</span>
            Alice {I.chevD}
          </button>
        </div>
      </div>

      {/* Sidebar */}
      <aside className="sidebar">
        <div className="s-row active"><span className="s-ico">{I.folder}</span><span className="s-lbl">My Bookmarks</span><span className="s-cnt">12</span></div>
        <div style={{paddingLeft:10}}>
          {["vacme-prod","insel","dev","uat","demo","iat"].map(n=>(
            <div key={n} className="s-row"><span className="s-ico">{I.folder}</span><span className="s-lbl">{n}</span></div>
          ))}
        </div>
        {showPropsSidebar&&propDefs.length>0&&<>
          <div className="s-head">Properties</div>
          {propDefs.map(pd=>(
            <div key={pd.id} className="s-row" onClick={()=>{setQuery(`property:${pd.name}=`);inputRef.current?.focus();}}>
              <span className="s-ico" style={{color:"#a78bfa"}}>{I.cube}</span>
              <span className="s-lbl">{pd.name}</span>
              <span className="s-cnt" style={{fontSize:10}}>{pd.type}</span>
            </div>
          ))}
        </>}
        <div className="s-head">Tags</div>
        {Object.values(TAGS).map(t=>(
          <div key={t.name} className="s-row" onClick={()=>onToggleToken({kind:"tag",value:t.name,neg:false})}>
            <span className="s-ico"><span className="tag-dot" style={{background:t.color}}/></span>
            <span className="s-lbl">{t.name}</span>
            <span className="s-cnt">{BOOKMARKS.filter(b=>b.tags.includes(t.name)).length}</span>
          </div>
        ))}
      </aside>

      {/* Main */}
      <main className="main">
        <div className="toolbar">
          <div className="bc">
            <span className="crumb">All Bookmarks</span>
            <span className="sep"> / </span>
            <span className="current">vacme-be</span>
          </div>
          <div className="tb-r">
            <div className="seg">
              <button className={layout==="grid"?"on":""} title="Grid" onClick={()=>setLayout("grid")}>{I.grid}</button>
              <button className={layout==="list"?"on":""} title="List" onClick={()=>setLayout("list")}>{I.list}</button>
            </div>
            <button className="tb-btn">
              <span style={{color:"var(--color-muted-foreground)"}}>Sort:</span> Date {I.chevD}
            </button>
            <span className="tb-divider"/>
            {/* ── Collection settings gear ── */}
            <div className="settings-anchor">
              <button
                className={"tb-btn icon-only"+(settingsOpen?" active":"")}
                style={settingsOpen?{background:"var(--color-secondary)",borderColor:"var(--color-primary)",color:"var(--color-primary)"}:{}}
                title="Collection settings"
                onClick={()=>setSettingsOpen(o=>!o)}
              >
                {I.gear}
              </button>
            </div>
          </div>
        </div>

        <div className="content">
          <FilterChips tokens={tokens} count={filtered.length} onRemove={onRemoveAt} onClear={()=>setQuery("")}/>
          {filtered.length===0
            ? <div className="empty">No bookmarks match your search.</div>
            : <div className={layout==="grid"?"grid":"space-y-3"} style={{gap:layout==="grid"?12:undefined}}>
                {filtered.map(b=><Card key={b.id} b={b} tokens={tokens} propDefs={propDefs}
                  onToggleToken={onToggleToken} onEdit={setEditingBm} showProps={showProps}/>)}
              </div>
          }
        </div>
      </main>
    </div>

    {editingBm&&<EditBookmarkDialog bookmark={editingBm} propDefs={propDefs} onClose={()=>setEditingBm(null)}/>}
    {settingsOpen&&<CollectionSettingsModal
      propDefs={propDefs}
      setPropDefs={defs=>{setPropDefs(defs);flash("Properties saved");}}
      showProps={showProps}
      onToggleShowProps={toggleShowProps}
      showPropsSidebar={showPropsSidebar}
      onTogglePropsSidebar={toggleShowPropsSidebar}
      layout={layout}
      setLayout={setLayout}
      onClose={()=>setSettingsOpen(false)}
    />}
    {toast&&<div className="toast">{I.check} {toast}</div>}

    {/* Tweaks */}
    <div className="tweaks">
      <b>UC-067 Properties</b>
      <div className="sec">Theme</div>
      <div className="seg2">
        <button className={theme==="light"?"on":""} onClick={()=>setTheme("light")}>light</button>
        <button className={theme==="dark"?"on":""} onClick={()=>setTheme("dark")}>dark</button>
      </div>
      <div className="sec">Try these searches</div>
      <div className="seg2" style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
        <button onClick={()=>setQuery("property:status=draft")}>status=draft</button>
        <button onClick={()=>setQuery("property:priority>3")}>priority&gt;3</button>
        <button onClick={()=>setQuery("property:needs-review=true")}>needs-review</button>
        <button onClick={()=>setQuery("")}>clear</button>
      </div>
      <div className="sec">Open dialogs</div>
      <div className="trow"><span>Collection settings</span><button className="btn-sm" onClick={()=>setSettingsOpen(true)}>gear ⚙</button></div>
      <div className="trow"><span>Edit bookmark</span><button className="btn-sm" onClick={()=>setEditingBm(BOOKMARKS[3])}>edit</button></div>
      <p className="note">Property badges: toggle in the gear → Display tab. State persists via localStorage.</p>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
