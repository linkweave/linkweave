// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ════════ checkbox ════════ */
function SelCheck({ checked, visible, onClick, small }){
  const ckSize = small?19:22, ckOff = small?6:8;
  return (
    <button onClick={onClick} aria-checked={checked} role="checkbox" title={checked?'Deselect':'Select'}
      style={{ position:'absolute', top:ckOff, left:ckOff, zIndex:3, width:ckSize, height:ckSize, borderRadius:'50%',
        display:'grid', placeItems:'center', cursor:'pointer', padding:0,
        border: checked?`1px solid ${shade(T.pri,8)}`:'1.5px solid rgba(255,255,255,.85)',
        background: checked?T.pri:'rgba(14,16,20,.45)',
        color:'#fff', boxShadow:'0 1px 5px rgba(0,0,0,.45)',
        opacity: visible?1:0, transform: visible?'scale(1)':'scale(.7)',
        transition:'opacity .13s, transform .13s, background .13s', pointerEvents: visible?'auto':'none' }}>
      {checked ? <Icon d={IC.check} size={small?11:13} sw={3} /> : null}
    </button>
  );
}

/* ════════ favicon ⇄ checkbox swap (previews off) ════════ */
function SwapCheck({ site, size=22, checked, showCheck, onClick }){
  return (
    <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
      <div aria-hidden={showCheck} style={{ position:'absolute', inset:0,
        opacity: showCheck?0:1, transform: showCheck?'scale(.6) rotate(-30deg)':'scale(1)',
        transition:'opacity .13s, transform .15s', pointerEvents:'none' }}>
        <Fav site={site} size={size} radius={5} />
      </div>
      <button onClick={onClick} role="checkbox" aria-checked={checked} title={checked?'Deselect':'Select'}
        style={{ position:'absolute', inset:0, width:size, height:size, borderRadius:'50%',
          display:'grid', placeItems:'center', padding:0, cursor:'pointer', color:'#fff',
          border: checked?`1px solid ${shade(T.pri,8)}`:'1.5px solid #6e7480',
          background: checked?T.pri:'transparent',
          opacity: showCheck?1:0, transform: showCheck?'scale(1)':'scale(.6) rotate(30deg)',
          transition:'opacity .13s, transform .15s, background .13s',
          pointerEvents: showCheck?'auto':'none' }}>
        {checked ? <Icon d={IC.check} size={Math.round(size*0.55)} sw={3} /> : null}
      </button>
    </div>
  );
}

/* ════════ dialogs ════════ */
function Modal({ children, onClose, width=400, label }){
  useEffect(()=>{
    const fn = e=>{ if(e.key==='Escape'){ e.stopPropagation(); onClose(); } };
    window.addEventListener('keydown', fn, true);
    return ()=>window.removeEventListener('keydown', fn, true);
  },[]);
  return (
    <div data-screen-label={label} onClick={onClose} style={{ position:'fixed', inset:0, zIndex:60, background:'rgba(8,9,12,.6)',
      display:'grid', placeItems:'center', backdropFilter:'blur(2px)' }}>
      <div onClick={e=>e.stopPropagation()} style={{ width, maxWidth:'calc(100vw - 40px)', borderRadius:12,
        border:`1px solid ${T.bdr}`, background:T.card, boxShadow:'0 24px 70px rgba(0,0,0,.6)',
        fontFamily:T.font, color:T.mfg, animation:'uc-pop .16s cubic-bezier(.2,.7,.3,1)' }}>{children}</div>
    </div>
  );
}
function DlgBtn({ children, primary, danger, onClick, autoFocus }){
  return (
    <button onClick={onClick} autoFocus={autoFocus} style={{ height:32, padding:'0 14px', borderRadius:7, fontSize:12.5,
      fontWeight:600, cursor:'pointer', fontFamily:T.font,
      border: primary||danger?0:`1px solid ${T.bdr}`,
      background: danger?'#c93838' : primary?T.pri:'transparent',
      color: primary||danger?'#fff':T.fg }}>{children}</button>
  );
}

function TagPopover({ anchorRef, onClose, onPick }){
  const [pos,setPos]=useState(null);
  useEffect(()=>{
    const r = anchorRef.current?.getBoundingClientRect();
    if(r) setPos({ top:r.bottom+6, left:Math.min(r.left, window.innerWidth-200) });
    const fn = ()=>onClose();
    window.addEventListener('mousedown', fn);
    return ()=>window.removeEventListener('mousedown', fn);
  },[]);
  if(!pos) return null;
  const tags = [{name:'blue',color:'#2563b0'},{name:'red',color:'#be123c'},{name:'daily',color:'#be123c'},{name:'ops',color:'#0e7490'}];
  return (
    <div onMouseDown={e=>e.stopPropagation()} style={{ position:'fixed', top:pos.top, left:pos.left, zIndex:70, width:186,
      borderRadius:9, border:`1px solid ${T.bdr}`, background:T.card, boxShadow:'0 14px 40px rgba(0,0,0,.55)',
      padding:6, fontFamily:T.font, animation:'uc-pop .14s cubic-bezier(.2,.7,.3,1)' }}>
      <div style={{ padding:'4px 8px 6px', fontSize:11, fontWeight:700, letterSpacing:'.05em', color:'#7d828c' }}>ADD TAG</div>
      {tags.map(t=>(
        <button key={t.name} onClick={()=>onPick(t.name)} style={{ display:'flex', alignItems:'center', gap:8, width:'100%',
          height:30, padding:'0 8px', borderRadius:6, border:0, background:'transparent', color:T.fg, fontSize:12.5,
          cursor:'pointer', fontFamily:T.font, textAlign:'left' }}
          onMouseEnter={e=>e.currentTarget.style.background=T.sec}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{ width:9, height:9, borderRadius:'50%', background:t.color }}></span>{t.name}
        </button>
      ))}
    </div>
  );
}

  const [selectMode, setSelectMode] = useState(false);
  const [anchor, setAnchor] = useState(null);
  const [dialog, setDialog] = useState(null); // 'move' | 'delete' | 'tag'
  const [leaving, setLeaving] = useState(()=>new Set());
  const [trashCount, setTrashCount] = useState(0);
  const [toasts, setToasts] = useState([]);
  const tagBtnRef = useRef(null);
  const [layout, setLayout] = useState('list');
  const [previews, setPreviews] = useState(true);

  const anySelected = selected.size>0;
  const selecting = anySelected || selectMode;

  const toast = useCallback((msg, kind='ok')=>{
    const id = Math.random().toString(36).slice(2);
    setToasts(ts=>[...ts, {id, msg, kind}]);
    setTimeout(()=>setToasts(ts=>ts.filter(x=>x.id!==id)), 4000);
  },[]);

  const clearSel = useCallback(()=>{ setSelected(new Set()); setSelectMode(false); setAnchor(null); },[]);

  const toggle = useCallback((idx)=>{
    setSelected(prev=>{
      const next = new Set(prev);
      const id = items[idx].id;
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
    setAnchor(idx);
  },[items]);

  const rangeTo = useCallback((idx)=>{
    if(anchor==null){ toggle(idx); return; }
    setSelected(prev=>{
      const next = new Set(prev);
      const [a,b] = anchor<idx ? [anchor,idx] : [idx,anchor];
      for(let i=a;i<=b;i++) next.add(items[i].id);
      return next;
    });
  },[anchor, items, toggle]);

  const onCardClick = useCallback((e, idx)=>{
    if(e.shiftKey && selecting){ e.preventDefault(); rangeTo(idx); return; }
    if(e.metaKey || e.ctrlKey){ toggle(idx); return; }
    if(selecting){ toggle(idx); return; }
    toast(`Opening ${items[idx].url.split('/')[0]} ↗`);
  },[selecting, rangeTo, toggle, items, toast]);

  const onCheck = useCallback((e, idx)=>{
    if(e.shiftKey && selecting){ rangeTo(idx); return; }
    toggle(idx);
  },[selecting, rangeTo, toggle]);

  /* keyboard: esc clears, cmd+a selects all while selecting */
  useEffect(()=>{
    const fn = (e)=>{
      if(e.key==='Escape' && !dialog) clearSel();
      if((e.metaKey||e.ctrlKey) && e.key==='a' && selecting && !dialog){
        e.preventDefault();
        setSelected(new Set(items.map(b=>b.id)));
      }
    };
    window.addEventListener('keydown', fn);
    return ()=>window.removeEventListener('keydown', fn);
  },[selecting, items, dialog, clearSel]);

  /* ── batch actions ── */
  const n = selected.size;
  const doMove = (folderId)=>{
    setDialog(null);
    if(t.simulateFailure){ toast('Failed to move bookmarks. No changes were made.', 'error'); return; }
    const name = folderId==null ? 'collection root' : FOLDERS.find(f=>f.id===folderId).name;
    toast(`Moved ${n} bookmark${n>1?'s':''} to ${name}.`);
    clearSel();
  };
  const doDelete = ()=>{
    setDialog(null);
    if(t.simulateFailure){ toast('Failed to delete bookmarks. No changes were made.', 'error'); return; }
    const ids = new Set(selected);
    setLeaving(ids);
    setTimeout(()=>{
      setItems(prev=>prev.filter(b=>!ids.has(b.id)));
      setLeaving(new Set());
      setTrashCount(c=>c+ids.size);
      toast(`${ids.size} bookmark${ids.size>1?'s':''} moved to trashbin.`);
    }, 240);
    clearSel();
  };
  const doCopy = ()=>{
    const urls = items.filter(b=>selected.has(b.id)).map(b=>'https://'+b.url).join('\n');
    try { navigator.clipboard && navigator.clipboard.writeText(urls); } catch(_e){}
    toast(`Copied ${n} URL${n>1?'s':''} to clipboard.`);
  };
  const doTag = (name)=>{
    setDialog(null);
    toast(`Tagged ${n} bookmark${n>1?'s':''} with “${name}”.`);
    clearSel();
  };

  return (
    <div style={{ display:'flex', height:'100vh', background:T.bg, color:T.fg, fontFamily:T.font, overflow:'hidden' }}>
      <Sidebar trashCount={trashCount} />
      <main data-screen-label={layout==='grid'?'Bookmark grid':'Bookmark list'} style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
        <Header />
        {/* toolbar */}
        <div style={{ display:'flex', alignItems:'center', gap:8, height:50, padding:'0 18px', flexShrink:0 }}>
          <span style={{ fontSize:12.5, color:'#7d828c' }}>{items.length} bookmarks</span>
          <div style={{ flex:1 }}></div>
          {t.toolbarSelect || t.entry==='button' ? (
            <ToolBtn on={selecting} onClick={()=> selecting ? clearSel() : setSelectMode(true)}>
              <Icon d={selecting?IC.x:IC.check} size={13} /> {selecting?'Cancel':'Select'}
            </ToolBtn>
          ) : null}
          <ToolBtn on={previews} onClick={()=>setPreviews(p=>!p)}><Icon d={IC.eye} size={13} /> Previews</ToolBtn>
          <Seg items={[IC.grid, IC.list]} active={layout==='grid'?0:1} onChange={(i)=>setLayout(i===0?'grid':'list')} />
          <ToolBtn><Icon d={IC.sortD} size={13} /> Date added <Icon d={IC.chevD} size={11} /></ToolBtn>
          <button style={{ width:30, height:30, borderRadius:7, border:0, background:'transparent', color:T.mfg,
            display:'grid', placeItems:'center', cursor:'pointer' }}><Icon d={IC.gear} size={15} /></button>
        </div>
        <BatchBar count={n} total={items.length} tagBtnRef={tagBtnRef}
          onClear={clearSel}
          onSelectAll={()=>setSelected(new Set(items.map(b=>b.id)))}
          onMove={()=>setDialog('move')}
          onTag={()=>setDialog(dialog==='tag'?null:'tag')}
          onCopy={doCopy}
          onDelete={()=>setDialog('delete')} />
        {/* grid */}
        <div style={{ flex:1, overflowY:'auto', padding:'14px 18px 30px' }}>
          {layout==='grid' ? (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(252px, 1fr))', gap:16 }}>
              {items.map((b,i)=>(
                <Card key={b.id} site={b} idx={i} previews={previews}
                  checked={selected.has(b.id)} anySelected={anySelected}
                  entry={t.entry} selectMode={selectMode} selStyle={t.selStyle}
                  leaving={leaving.has(b.id)}
                  onCardClick={onCardClick} onCheck={onCheck} />
              ))}
            </div>
          ) : (
            <div style={{ border:`1px solid ${T.bdr}`, borderRadius:8, background:T.card, overflow:'hidden' }}>
              {items.map((b,i)=>(
                <Row key={b.id} site={b} idx={i} last={i===items.length-1} previews={previews}
                  checked={selected.has(b.id)} anySelected={anySelected}
                  entry={t.entry} selectMode={selectMode} selStyle={t.selStyle}
                  leaving={leaving.has(b.id)}
                  onCardClick={onCardClick} onCheck={onCheck} />
              ))}
            </div>
          )}
        </div>
      </main>

      {dialog==='move' ? <MoveDialog count={n} onCancel={()=>setDialog(null)} onConfirm={doMove} /> : null}
      {dialog==='delete' ? <DeleteDialog count={n} onCancel={()=>setDialog(null)} onConfirm={doDelete} /> : null}
      {dialog==='tag' ? <TagPopover anchorRef={tagBtnRef} onClose={()=>setDialog(null)} onPick={doTag} /> : null}
      <Toasts list={toasts} />

      <TweaksPanel>
        <TweakSection label="Selection" />
        <TweakRadio label="Entry mechanic" value={t.entry} options={['hover','always','button']}
          onChange={v=>{ setTweak('entry', v); }} />
        <TweakRadio label="Selected style" value={t.selStyle} options={['inset','ring']}
          onChange={v=>setTweak('selStyle', v)} />
        <TweakToggle label="Select button in toolbar" value={t.toolbarSelect}
          onChange={v=>setTweak('toolbarSelect', v)} />
        <TweakSection label="Edge cases" />
        <TweakToggle label="Simulate batch failure" value={t.simulateFailure}
          onChange={v=>setTweak('simulateFailure', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
