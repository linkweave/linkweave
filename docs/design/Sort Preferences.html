<!doctype html>

<title>LinkWeave — Sort Preferences (FR-082)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0b;color:#ededed;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:56px 1fr;height:100vh;grid-template-areas:"head head" "side main"}
.header{grid-area:head;border-bottom:1px solid #26272c;background:#0f0f11;display:flex;align-items:center;padding:0 16px;gap:16px}

.search-wrap{flex:1;display:flex;justify-content:center;min-width:0}
.search{display:flex;align-items:center;gap:8px;width:min(560px,100%);height:34px;padding:0 10px 0 12px;background:#16171a;border:1px solid #26272c;border-radius:6px;color:#9aa0a6}

.search input::placeholder{color:#6b7075}

.h-actions{display:flex;align-items:center;gap:6px}
.btn-pri{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;background:#3b82f6;color:#fff;border:0;border-radius:6px;font-weight:500;box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
.btn-pri:hover{background:#2563eb}
.user{display:flex;align-items:center;gap:6px;height:34px;padding:0 10px;background:transparent;border:1px solid transparent;border-radius:6px;color:#ededed;font-weight:500}

.avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#6366f1);display:grid;place-items:center;font-size:10px;font-weight:700}

.s-row.tag-row .s-ico{color:#ef4444}

.s-row.tag-row.green .s-ico{color:#22c55e}
.s-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-cnt{color:#6b7075;font-size:12px;font-variant-numeric:tabular-nums}
.s-head{padding:14px 8px 6px;color:#9aa0a6;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

.main{grid-area:main;overflow-y:auto;background:#0a0a0b;position:relative}
.toolbar{position:sticky;top:0;z-index:20;height:44px;display:flex;align-items:center;padding:0 24px;gap:12px;background:rgba(10,10,11,.85);backdrop-filter:blur(12px) saturate(160%);-webkit-backdrop-filter:blur(12px) saturate(160%);border-bottom:1px solid #26272c}
.bc{display:flex;align-items:center;gap:6px;font-size:13.5px;color:#9aa0a6;flex:1}

.tb-r{display:flex;align-items:center;gap:6px}
.tb-btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 10px;background:transparent;border:1px solid #26272c;border-radius:6px;color:#ededed;font-size:13px;font-weight:500}

.sort-menu{position:absolute;top:calc(100% + 6px);right:0;width:300px;background:#16171a;border:1px solid #33343a;border-radius:8px;box-shadow:0 16px 40px rgba(0,0,0,.6);padding:6px;z-index:50}
.sm-h{padding:8px 10px 6px;color:#9aa0a6;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:baseline}

.opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px}

.dir{display:flex;border:1px solid #26272c;border-radius:5px;overflow:hidden;background:#0f0f11}
.dir button{width:24px;height:22px;display:grid;place-items:center;background:transparent;border:0;color:#6b7075}

.sm-f{margin-top:4px;padding:8px 10px;border-top:1px solid #26272c;display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6b7075}

.sm-f .pin:hover{color:#ededed;background:#1c1d21}
.grid-wrap{padding:20px 24px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.card{background:#0f0f11;border:1px solid #26272c;border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:6px}

.c-row{display:flex;align-items:center;gap:10px;min-width:0}
.c-fav{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center;color:#9aa0a6}
.c-title{font-weight:600;font-size:14.5px;color:#ededed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.c-url{font-size:13px;color:#9aa0a6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#6b7075;margin-top:2px;flex-wrap:wrap}
.meta-chip{display:inline-flex;align-items:center;gap:4px;color:#9aa0a6}
.tag-pill{display:inline-flex;align-items:center;padding:1.5px 8px;border-radius:9999px;font-size:11.5px;font-weight:500;background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.tag-pill.blue{background:rgba(59,130,246,.18);color:#93c5fd;border-color:rgba(59,130,246,.25)}
.tag-pill.green{background:rgba(34,197,94,.18);color:#86efac;border-color:rgba(34,197,94,.25)}
.tag-pill.amber{background:rgba(245,158,11,.18);color:#fcd34d;border-color:rgba(245,158,11,.25)}
.never{display:flex;align-items:center;gap:12px;grid-column:1/-1;color:#6b7075;font-size:12px;margin:16px 0 4px}
.never::before,.never::after{content:"";flex:1;height:1px;background:#26272c}

.dialog{width:min(560px,calc(100vw - 32px));background:#0f0f11;border:1px solid #33343a;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.6);overflow:hidden}
.d-h{padding:18px 22px 14px;border-bottom:1px solid #26272c;display:flex;align-items:center;justify-content:space-between}
.d-h h2{font-size:16px;font-weight:600}
.d-tabs{display:flex;border-bottom:1px solid #26272c;padding:0 22px}
.d-tab{padding:10px 12px;color:#9aa0a6;font-size:13px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-left:0;border-right:0;border-top:0}
.d-tab:hover{color:#ededed}
.d-tab.on{color:#ededed;border-bottom-color:#3b82f6}
.d-body{padding:20px 22px}
.d-body h3{font-size:13.5px;font-weight:600;margin-bottom:4px}
.hint{font-size:12.5px;color:#9aa0a6;margin-bottom:14px;line-height:1.5}
.d-row{display:flex;gap:8px;align-items:center;position:relative;margin-bottom:10px}
.fsel{flex:1;display:flex;align-items:center;justify-content:space-between;height:36px;padding:0 12px;background:#16171a;border:1px solid #26272c;border-radius:6px;color:#ededed;font-size:14px}
.fsel:hover{border-color:#33343a}
.dirbig{display:flex;border:1px solid #26272c;border-radius:6px;overflow:hidden;height:36px}
.dirbig button{width:36px;display:grid;place-items:center;background:#16171a;border:0;color:#9aa0a6}
.dirbig button.on{background:#1c1d21;color:#ededed}
.d-foot{padding:14px 22px;border-top:1px solid #26272c;display:flex;justify-content:flex-end;gap:8px;background:#0f0f11}
.btn-sec{height:34px;padding:0 14px;background:transparent;color:#ededed;border:1px solid #26272c;border-radius:6px;font-weight:500}
.btn-sec:hover{background:#16171a;border-color:#33343a}
.mode-tag{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;padding:6px 12px;background:rgba(15,15,17,.92);border:1px solid #33343a;border-radius:9999px;font-size:11.5px;color:#9aa0a6;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:5;display:flex;align-items:center;gap:6px;pointer-events:none}

.mode-current .toolbar{position:static;background:transparent;backdrop-filter:none;border-bottom:0}
.mode-current .mode-tag .dot{background:#6b7075}
</style>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const {useState, useRef, useEffect} = React;

const SORT_FIELDS = [
  {id:"title",      label:"Title",        sub:"A → Z by title",         asc:"A → Z",           desc:"Z → A"},
  {id:"dateAdded",  label:"Date added",   sub:"When you saved it",      asc:"Oldest first",    desc:"Newest first"},
  {id:"lastClicked",label:"Last clicked", sub:"Most recently opened",   asc:"Oldest first",    desc:"Most recent first"},
  {id:"clickCount", label:"Click count",  sub:"How often you visit it", asc:"Least visited",   desc:"Most visited"},
];

const BOOKMARKS = [
  {title:"VacMe – Portal", url:"be.vacme.ch/start", fav:"green", tag:"red", added:"2026-05-04", last:"2026-05-08", clicks:42},
  {title:"prod kc other", url:"be.vacme.ch/auth/admin", fav:"globe", tag:"red", added:"2026-05-04", last:"2026-05-07", clicks:18},
  {title:"impfen VacMe – Portal", url:"impfen-be.vacme.ch/start", fav:"green", tag:"red", added:"2026-05-04", last:"2026-05-06", clicks:11},
  {title:"Quarkus – Scheduling Periodic Tasks", url:"quarkus.io/guides/scheduler", fav:"globe", tag:"blue", added:"2026-04-21", last:"2026-04-30", clicks:7},
  {title:"Topology · Apollo Cluster", url:"apollo.dvbern.ch/topology", fav:"globe", tag:"amber", added:"2026-04-12", last:"2026-04-12", clicks:3},
  {title:"Grafana UAT", url:"grafana-uat.vacme.ch/d/main", fav:"globe", tag:"blue", added:"2026-03-30", last:null, clicks:0},
  {title:"eSchool", url:"eschool.dvbern.ch", fav:"globe", tag:"green", added:"2026-03-18", last:null, clicks:0},
  {title:"Pipeline · eSchool · GitLab", url:"gitlab.dvbern.ch/esc/pipeline", fav:"globe", tag:"amber", added:"2026-03-04", last:null, clicks:0},
];

function cmp(a,b,field,dir){
  const m = dir==="asc"?1:-1;
  let c;
  if(field==="title") c = a.title.localeCompare(b.title,undefined,{sensitivity:"base"});
  else if(field==="dateAdded") c = a.added.localeCompare(b.added);
  else if(field==="lastClicked"){
    if(!a.last && !b.last) c=0;
    else if(!a.last) return 1;
    else if(!b.last) return -1;
    else c = a.last.localeCompare(b.last);
  } else if(field==="clickCount"){
    if(!a.clicks && !b.clicks) c=0;
    else if(!a.clicks) return 1;
    else if(!b.clicks) return -1;
    else c = a.clicks - b.clicks;
  }
  if(c===0) c = b.added.localeCompare(a.added);
  return c*m;
}

function sortBks(field,dir){
  if(field==="lastClicked"||field==="clickCount"){
    const has = BOOKMARKS.filter(b=> field==="lastClicked"?!!b.last:b.clicks>0).slice();
    const none = BOOKMARKS.filter(b=> field==="lastClicked"?!b.last:!b.clicks).slice();
    has.sort((a,b)=>cmp(a,b,field,dir));
    none.sort((a,b)=>b.added.localeCompare(a.added));
    return {primary:has, never:none};
  }
  return {primary:BOOKMARKS.slice().sort((a,b)=>cmp(a,b,field,dir)), never:[]};
}

const I = {
  search: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  plus: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
  bookmark: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,
  chevDown: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
  folder: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="currentColor" fillOpacity=".15"/><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor"/></svg>,
  globe: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20"/><path d="M12 2a14.5 14.5 0 0 1 0 20"/><path d="M2 12h20"/></svg>,
  tag: <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>,
  up: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>,
  down: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>,
  check: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>,
  grid: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  list: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>,
  settings: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>,
  pin: <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 17v5"/><path d="M9 10.76V6a3 3 0 0 1 6 0v4.76a2 2 0 0 0 .89 1.66l1.61 1.05A2 2 0 0 1 18 15.6V17H6v-1.4a2 2 0 0 1 .5-1.13l1.61-1.05A2 2 0 0 0 9 10.76z"/></svg>,
};

function Sidebar(){
  const folder = (name,sub,active,sel) => (
    <React.Fragment key={name}>
      <div className="s-row">
        <span className="s-ico">{I.folder}</span>
        <span className="s-lbl">{name}</span>
      </div>
      {sub && <div className="s-children">{sub.map(s => (
        <div key={s} className={"s-row" + (s===sel?" active":"")}>
          <span className="s-ico">{I.folder}</span>
          <span className="s-lbl">{s}</span>
        </div>
      ))}</div>}
    </React.Fragment>
  );
  return <div>
    <div className="s-row active"><span className="s-ico">{I.folder}</span><span className="s-lbl">My Bookmarks</span></div>
    <div className="s-children">
      {folder("dvbern")}{folder("kis")}
      {folder("vacme-be",["dev","vacme-prod","demo","iat","uat"],null,"vacme-prod")}
      {folder("well")}
      {folder("mik",["prod","dev","uat"])}
      {folder("BFH")}{folder("esc")}
      {folder("vacme-zh",["uat","dev","iat"])}
    </div>
    <div className="s-head"><span style={{color:"#9aa0a6"}}>{I.tag}</span> Tags</div>
    <div className="s-row tag-row"><span className="s-ico">{I.tag}</span><span className="s-lbl" style={{fontSize:13}}>imported=2026-05-04_1</span><span className="s-cnt">180</span></div>
    <div className="s-row tag-row blue"><span className="s-ico">{I.tag}</span><span className="s-lbl" style={{fontSize:13}}>quarkus</span><span className="s-cnt">12</span></div>
    <div className="s-row tag-row green"><span className="s-ico">{I.tag}</span><span className="s-lbl" style={{fontSize:13}}>docs</span><span className="s-cnt">23</span></div>
  </div>;
}

function SortMenu({field,dir,onField,onDir,onClose}){
  const ref = useRef(null);
  useEffect(()=>{
    const d = e => { if(ref.current && !ref.current.contains(e.target)) onClose(); };
    const k = e => { if(e.key==="Escape") onClose(); };
    setTimeout(()=>document.addEventListener("mousedown",d),0);
    document.addEventListener("keydown",k);
    return ()=>{document.removeEventListener("mousedown",d);document.removeEventListener("keydown",k);};
  },[onClose]);
  return <div className="sort-menu" ref={ref}>
    <div className="sm-h"><span>Sort · this collection</span><button className="reset">Reset</button></div>
    {SORT_FIELDS.map(f => {
      const sel = f.id===field;
      return <div key={f.id} className={"opt"+(sel?" sel":"")} onClick={()=>onField(f.id)}>
        <span className="ck">{I.check}</span>
        <div className="lbl">{f.label}<div className="sub">{sel?(dir==="asc"?f.asc:f.desc):f.sub}</div></div>
        {sel && <div className="dir" onClick={e=>e.stopPropagation()}>
          <button className={dir==="asc"?"on":""} onClick={()=>onDir("asc")} title={f.asc}>{I.up}</button>
          <button className={dir==="desc"?"on":""} onClick={()=>onDir("desc")} title={f.desc}>{I.down}</button>
        </div>}
      </div>;
    })}
    <div className="sm-f">{I.pin}<span>Saved per-collection ·</span><button className="pin">Use as default</button></div>
  </div>;
}

function Card({b,dim}){
  return <div className={"card"+(dim?" dim":"")}>
    <div className="c-row">
      <span className="c-fav">{b.fav==="green"?<span className="green-dot"/>:I.globe}</span>
      <span className="c-title">{b.title}</span>
    </div>
    <div className="c-url">https://{b.url}</div>
    <div className="c-meta">
      <span className="meta-chip"><span style={{color:"#6b7075"}}>{I.folder}</span>in vacme-prod</span>
      <span className={"tag-pill "+(b.tag||"blue")}>imported=2026-05-04_1</span>
    </div>
  </div>;
}

function App(){
  const [layoutMode,setLayoutMode] = useState("proposed");
  const [field,setField] = useState("dateAdded");
  const [dir,setDir] = useState("desc");
  const [menuOpen,setMenuOpen] = useState(false);
  const [showSettings,setShowSettings] = useState(false);
  const [defField,setDefField] = useState("dateAdded");
  const [defDir,setDefDir] = useState("desc");
  const [view,setView] = useState("grid");
  const [defOpen,setDefOpen] = useState(false);

  const f = SORT_FIELDS.find(x=>x.id===field);
  const {primary,never} = sortBks(field,dir);
  const df = SORT_FIELDS.find(x=>x.id===defField);

  return <div className={"app "+(layoutMode==="current"?"mode-current":"")}>
    <div className="header">
      <div className="brand">
        <div className="brand-mark">{I.bookmark}</div>
        <button className="coll">My Bookmarks <span className="chev">{I.chevDown}</span></button>
      </div>
      <div className="search-wrap">
        <label className="search">{I.search}<input placeholder="Search bookmarks (use spaces for multiple terms, e.g. prod foobar)…"/><span className="kbd">⌘ K</span></label>
      </div>
      <div className="h-actions">
        <button className="btn-pri">{I.plus} Add Bookmark</button>
        <button className="user"><span className="avatar">A</span>Alice User<span style={{color:"#9aa0a6"}}>{I.chevDown}</span></button>
      </div>
    </div>
    <aside className="sidebar"><Sidebar/></aside>
    <main className="main">
      {layoutMode==="current" && <div className="legacy"><label className="search">{I.search}<input placeholder="Search bookmarks…"/><span className="kbd">⌘ K</span></label></div>}
      <div className="toolbar">
        <div className="bc">
          <span className="crumb">All Bookmarks</span><span className="sep">/</span>
          <span className="crumb">vacme-be</span><span className="sep">/</span>
          <span className="current">vacme-prod</span>
        </div>
        <div className="tb-r">
          <button className={"tb-btn icon"+(view==="grid"?" on":"")} onClick={()=>setView("grid")}>{I.grid}</button>
          <button className={"tb-btn icon"+(view==="list"?" on":"")} onClick={()=>setView("list")}>{I.list}</button>
          <span className="tb-divider"/>
          <div className="sort-anchor">
            <button className="tb-btn" onClick={()=>setMenuOpen(o=>!o)}>
              <span className="lbl-mu">Sort:</span> {f.label}
              <span style={{color:"#9aa0a6"}}>{dir==="desc"?I.down:I.up}</span>
              <span style={{color:"#6b7075"}}>{I.chevDown}</span>
            </button>
            {menuOpen && <SortMenu field={field} dir={dir} onField={setField} onDir={setDir} onClose={()=>setMenuOpen(false)}/>}
          </div>
          <button className="tb-btn icon" onClick={()=>setShowSettings(true)} title="Settings">{I.settings}</button>
        </div>
      </div>
      <div className="grid-wrap">
        <div className="grid">
          {primary.map(b=><Card key={b.title} b={b}/>)}
          {never.length>0 && <div className="never"><span className="pill">Never opened · {never.length}</span></div>}
          {never.map(b=><Card key={b.title} b={b} dim/>)}
        </div>
      </div>
      <div className="mode-tag"><span className="dot"/>{layoutMode==="current"?"Current layout · search inline, no sort":"Proposed layout · search in header, sticky sort toolbar"}</div>
    </main>

    {showSettings && <div className="overlay" onClick={()=>setShowSettings(false)}>
      <div className="dialog" onClick={e=>e.stopPropagation()}>
        <div className="d-h"><h2>Settings</h2><button className="tb-btn icon" onClick={()=>setShowSettings(false)}>✕</button></div>
        <div className="d-tabs"><button className="d-tab">Account</button><button className="d-tab">Appearance</button><button className="d-tab on">Bookmarks</button><button className="d-tab">Offline</button><button className="d-tab">Language</button></div>
        <div className="d-body">
          <h3>Default sort for new collections</h3>
          <p className="hint">Applied the first time you open a collection. Each collection then remembers its own preference — change a collection's sort and that override sticks until you reset it.</p>
          <div className="d-row">
            <button className="fsel" onClick={()=>setDefOpen(o=>!o)}><span>{df.label} <span style={{color:"#9aa0a6"}}>· {defDir==="asc"?df.asc:df.desc}</span></span><span style={{color:"#6b7075"}}>{I.chevDown}</span></button>
            <div className="dirbig">
              <button className={defDir==="asc"?"on":""} onClick={()=>setDefDir("asc")}>{I.up}</button>
              <button className={defDir==="desc"?"on":""} onClick={()=>setDefDir("desc")}>{I.down}</button>
            </div>
            {defOpen && <div className="sort-menu" style={{left:0,right:"auto",top:"calc(100% + 6px)",width:280}}>
              {SORT_FIELDS.map(o => <div key={o.id} className={"opt"+(o.id===defField?" sel":"")} onClick={()=>{setDefField(o.id);setDefOpen(false);}}>
                <span className="ck">{I.check}</span>
                <div className="lbl">{o.label}<div className="sub">{o.sub}</div></div>
              </div>)}
            </div>}
          </div>
          <div style={{marginTop:24}}>
            <h3>Bookmark click tracking</h3>
            <p className="hint">Powers <em>Last clicked</em> and <em>Click count</em> sort options. Click data is stored per-user — collaborators on shared collections cannot see your activity.</p>
          </div>
        </div>
        <div className="d-foot">
          <button className="btn-sec" onClick={()=>setShowSettings(false)}>Cancel</button>
          <button className="btn-pri" onClick={()=>setShowSettings(false)}>Save changes</button>
        </div>
      </div>
    </div>}

    <div className="tweaks">
      <b>FR-082 Tweaks</b>
      <div className="sec">Layout</div>
      <div className="lbl">Layout mode</div>
      <div className="seg">
        <button className={layoutMode==="current"?"on":""} onClick={()=>setLayoutMode("current")}>current</button>
        <button className={layoutMode==="proposed"?"on":""} onClick={()=>setLayoutMode("proposed")}>proposed</button>
      </div>
      <div className="sec">Sort preference</div>
      <div className="lbl">Field</div>
      <select value={field} onChange={e=>setField(e.target.value)}>
        {SORT_FIELDS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
      </select>
      <div className="lbl">Direction</div>
      <div className="seg">
        <button className={dir==="asc"?"on":""} onClick={()=>setDir("asc")}>asc</button>
        <button className={dir==="desc"?"on":""} onClick={()=>setDir("desc")}>desc</button>
      </div>
      <button className="actbtn" onClick={()=>setShowSettings(true)}>Open Settings → Bookmarks</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
