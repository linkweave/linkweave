# Builds the LinkWeave desktop app for macOS (Apple Silicon), Windows, and Linux.
#
# Triggered by:
#   - Tags matching v*       -> full build + GitHub Release upload
#   - Manual dispatch        -> test build (version 0.0.0), no release
#
# Builds only on tags so the stamped version is always a clean semver (the Windows MSI/WiX
# bundler rejects non-numeric versions). Each runner builds for its own architecture and bundles
# a matching jlinked Java 25 runtime, so the artifacts are self-contained.
#
# Uses the shared scripts/build-desktop.sh (macOS/Linux) and build-desktop.ps1 (Windows).
# Gitea remains the primary CI for Docker/extension/deploy; this workflow only handles the
# desktop bundle because GitHub offers hosted macOS and Windows runners.
name: Build Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    # Only uploads artifacts (no repo writes) — least privilege. The release job below holds the
    # contents: write needed to publish the GitHub Release.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest      # Apple Silicon (arm64)
            platform: macos-arm64
          - runner: windows-latest
            platform: windows-x64
          - runner: ubuntu-22.04
            platform: linux-x64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # --- System dependencies ---
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # --- Toolchain: Java (also the source for the bundled jlink runtime) ---
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          # Must ship `jmods`: Temurin 25 does not AND lacks JEP 493 run-time-image linking, so
          # `jlink` cannot build a runtime ("does not contain packaged modules"). Zulu ships jmods,
          # so jlink works. (Confirmed on CI: temurin fails at stage 5, zulu is required.)
          distribution: zulu
          cache: maven

      # --- Toolchain: Node + pnpm ---
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # --- Toolchain: Rust (host target only; we build natively per runner) ---
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      # --- Version: single source of truth, passed to both build scripts via DESKTOP_VERSION ---
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"   # manual dispatch test build; numeric so the Windows MSI bundler accepts it
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # --- Build (macOS/Linux) ---
      - name: Build desktop (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/build-desktop.sh
        env:
          DESKTOP_VERSION: ${{ steps.version.outputs.VERSION }}

      # --- Build (Windows) ---
      - name: Build desktop (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\build-desktop.ps1
        env:
          DESKTOP_VERSION: ${{ steps.version.outputs.VERSION }}

      # --- Upload build artifacts ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linkweave-desktop-${{ matrix.platform }}-${{ steps.version.outputs.VERSION }}
          path: desktop/dist/*
          retention-days: 30

  release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LinkWeave Desktop ${{ github.ref_name }}
          body: |
            Desktop builds for **LinkWeave ${{ github.ref_name }}**.

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows (x64) | `.exe` / `.msi` |
            | Linux (x64) | `.deb` |

            Self-contained — a Java 25 runtime is bundled; no separate Java install required.
          draft: false
          prerelease: false
          # Attach only the installers; the macOS .app folder is also collected locally but the .dmg
          # is the shippable artifact (the .app lives inside it).
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
