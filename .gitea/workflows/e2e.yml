# Playwright e2e suite. Boots the API on :8443 and the Vite dev server on
# :5173, then runs Chromium against the pair. Kept separate from build.yml so
# a flaky e2e doesn't block image publishing.
#
# Assumptions:
#   - Vite proxies /api to $VITE_API_TARGET (defaults to the prod-like dev
#     hostname when unset — see vite.config.ts). Workflow points it at the
#     local Quarkus instance below.
#   - The dev TLS cert lives under developer-local-settings/, which is
#     gitignored. CI generates a fresh self-signed cert via mkcert before
#     starting the API.
#   - CL_FORM_LOGIN_COOKIE_SECRET only needs a value, anything works for tests.
name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Form-login cookie encryption key. Tests don't care about the value, but
      # Quarkus refuses to boot without one.
      CL_FORM_LOGIN_COOKIE_SECRET: ci-e2e-cookie-secret-placeholder
      # Dedicated CI hostname keeps any future concurrent dev/CI usage from
      # colliding on cookies/storage and makes it obvious in test reports
      # that the run was an e2e run rather than dev.
      E2E_HOST: e2e-chainlink.localhost
      VITE_DEV_HOST: e2e-chainlink.localhost
      PLAYWRIGHT_BASE_URL: https://e2e-chainlink.localhost:5173
      # Vite proxies /api straight at the local Quarkus instance. The cert's
      # SAN list includes 'localhost', so TLS verification works even though
      # the browser-facing hostname is e2e-chainlink.localhost.
      VITE_API_TARGET: https://localhost:8443

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Hostname alias for the e2e domain
        # *.localhost normally resolves to 127.0.0.1 via systemd-resolved on
        # ubuntu-latest, but explicit /etc/hosts is bullet-proof.
        run: |
          echo "127.0.0.1 ${E2E_HOST}" | sudo tee -a /etc/hosts

      - name: Install mkcert
        # developer-local-settings/ is gitignored, so a fresh checkout has no
        # certs. The repo's own scripts/certs/generate-keypair.sh issues them
        # via mkcert + keytool — we just need mkcert on PATH first.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3-tools
          curl -sSL -o /tmp/mkcert https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-amd64
          chmod +x /tmp/mkcert
          sudo mv /tmp/mkcert /usr/local/bin/mkcert
          mkcert -install

      - name: Generate dev TLS cert
        env:
          CERT_DOMAINS: ${{ env.E2E_HOST }}
        run: bash scripts/certs/generate-keypair.sh

      - name: Build API
        working-directory: api
        run: ./mvnw -B -DskipTests package -Dquarkus.package.jar.type=fast-jar

      - name: Start API (dev profile, background)
        working-directory: api
        # Dev profile keeps the relaxed register rate-limit and auto-creates
        # the SQLite DB. quarkus:dev is overkill (hot reload, dev-ui); the
        # built fast-jar is faster to launch.
        run: |
          java -jar target/quarkus-app/quarkus-run.jar \
            -Dquarkus.profile=dev \
            -Dquarkus.http.host=0.0.0.0 \
            > ../api-stdout.log 2>&1 &
          echo $! > ../api.pid
          # Wait for /q/health (Quarkus's smallrye-health endpoint)
          for i in $(seq 1 60); do
            if curl -sk https://localhost:8443/q/health/ready >/dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e (Chromium)
        working-directory: frontend
        # playwright.config.ts already auto-starts `npm run dev` via webServer
        # and waits for it on :5173.
        run: npx playwright test --project=chromium

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: api-stdout
          path: api-stdout.log
          retention-days: 14
