name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - id: java-setup
        name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: api
        run: ./mvnw package -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-api:latest
            git.markushofstetter.com/dividbzero/chainlink-api:${{ steps.commit-hash.outputs.COMMIT_HASH }}
            ${{ startsWith(gitea.ref, 'refs/tags/v') && format('git.markushofstetter.com/dividbzero/chainlink-api:{0}', gitea.ref_name) || '' }}
          file: api/src/main/docker/Dockerfile.jvm
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink API
            org.opencontainers.image.description=Quarkus-based Java backend for Chainlink

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: frontend
        run: pnpm test

  build-frontend:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Get version
        id: version
        run: |
          if [[ "${{ gitea.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ gitea.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          fi
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "Version: $VERSION"

      - name: Print commit hash
        run: |
          echo "Commit hash output: ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-frontend:latest
            git.markushofstetter.com/dividbzero/chainlink-frontend:${{ steps.commit-hash.outputs.COMMIT_HASH }}
            ${{ startsWith(gitea.ref, 'refs/tags/v') && format('git.markushofstetter.com/dividbzero/chainlink-frontend:{0}', gitea.ref_name) || '' }}
          file: frontend/Dockerfile
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            VERSION=${{ steps.version.outputs.VERSION }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink Frontend
            org.opencontainers.image.description=Vue.js frontend for Chainlink

  build-extension:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.version.outputs.ARTIFACT_NAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate version
        id: version
        run: |
          if [[ "${{ gitea.ref }}" == refs/tags/v* ]]; then
            # Strip leading 'v' from tag → e.g. v1.2.3 → 1.2.3
            VERSION="${{ gitea.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Format: YYYY.MMDD.HHMM — always increasing, fits Chrome Web Store constraints
            VERSION="$(date -u +'%Y.%-m%d.%-H%M')"
          fi
          ARTIFACT_NAME="chainlink-extension-${VERSION}"
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITEA_OUTPUT
          echo "Extension version: $VERSION"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Stamp version in manifest
        working-directory: frontend/extension-public
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' manifest.json
          echo "Manifest version:"
          grep '"version"' manifest.json

      - name: Build extension
        working-directory: frontend
        run: pnpm run build:extension

      - name: Lint extension
        working-directory: frontend
        run: pnpm exec web-ext lint --source-dir dist-extension

      - name: Package extension
        working-directory: frontend
        run: pnpm exec web-ext build --source-dir dist-extension --artifacts-dir . --overwrite-dest --filename chainlink-extension.zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v3
        with:
          name: chainlink-extension-${{ steps.version.outputs.VERSION }}
          path: frontend/chainlink-extension.zip

  deploy:
    needs: [build, build-frontend]
    if: gitea.event_name == 'push' && gitea.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Checkout docker-compose-config
        uses: actions/checkout@v5
        with:
          repository: mh03r932/docker-compose-config
          token: ${{ secrets.DOCKER_COMPOSE_TOKEN_GITHUB }}
          path: docker-compose-config
          github-server-url: https://github.com

      - name: Print commit hash
        run: echo "Deploying with commit hash ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Update image tags in docker-compose.yml
        working-directory: docker-compose-config/chainlink
        run: |
          COMMIT_HASH="${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          echo "COMMIT_HASH variable value: $COMMIT_HASH"
          echo "Current docker-compose.yml content (before sed):"
          cat docker-compose.yml
          sed -i "s|chainlink-api:.*|chainlink-api:${COMMIT_HASH}|g" docker-compose.yml
          sed -i "s|chainlink-frontend:.*|chainlink-frontend:${COMMIT_HASH}|g" docker-compose.yml
          echo "docker-compose.yml content (after sed):"
          cat docker-compose.yml
          echo "Git diff showing changes:"
          git diff docker-compose.yml

      - name: Commit and push changes
        working-directory: docker-compose-config
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.gitea"
          git add chainlink/docker-compose.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(chainlink): update image tags to ${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          git push

  release:
    needs: [build-extension]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GITEA_API: ${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Create Gitea release and upload asset
        env:
          GITEA_TOKEN: ${{ secrets.ESC_REPO_TOKEN }}
        run: |
          set -x
          TAG="${{ gitea.ref_name }}"
          RESPONSE=$(curl -sf -w "\nHTTP_CODE:%{http_code}" -X POST \
            "${GITEA_API}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Release ${TAG}\"}" 2>/dev/null) || true
          HTTP_CODE=$(echo "$RESPONSE" | grep 'HTTP_CODE:' | cut -d: -f2)
          if [ "$HTTP_CODE" = "409" ] || [ "$HTTP_CODE" = "422" ]; then
            echo "Release already exists, fetching ID..."
            RELEASE_ID=$(curl -sf "${GITEA_API}/releases/tags/${TAG}" \
              -H "Authorization: token ${GITEA_TOKEN}" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          else
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to get/create release. Last response:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          curl -sf -w "\nHTTP_CODE:%{http_code}" -X POST \
            "${GITEA_API}/releases/${RELEASE_ID}/assets" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "name=chainlink-extension-${TAG}.zip" \
            -F "attachment=@chainlink-extension.zip"

  publish-extension:
    needs: [build-extension, release]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Publish to Chrome Web Store
        run: npx chrome-webstore-upload-cli@3 upload --source chainlink-extension.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_EXTENSION_GWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_EXTENSION_GWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_EXTENSION_GWS_REFRESH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Unzip extension for Firefox
        run: |
          mkdir -p extension-src
          unzip chainlink-extension.zip -d extension-src

      - name: Publish to Firefox Add-ons
        run: npx web-ext sign --channel=listed --source-dir extension-src
        env:
          WEB_EXT_API_KEY: ${{ secrets.FIREFOX_AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.FIREFOX_AMO_API_SECRET }}
