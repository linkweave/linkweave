name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - id: java-setup
        name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: api
        run: ./mvnw package -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-api:latest
            git.markushofstetter.com/dividbzero/chainlink-api:${{ steps.commit-hash.outputs.COMMIT_HASH }}
          file: api/src/main/docker/Dockerfile.jvm
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink API
            org.opencontainers.image.description=Quarkus-based Java backend for Chainlink

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Print commit hash
        run: |
          echo "Commit hash output: ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-frontend:latest
            git.markushofstetter.com/dividbzero/chainlink-frontend:${{ steps.commit-hash.outputs.COMMIT_HASH }}
          file: frontend/Dockerfile
          build-args: |
            COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink Frontend
            org.opencontainers.image.description=Vue.js frontend for Chainlink

  build-extension:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.version.outputs.ARTIFACT_NAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate version
        id: version
        run: |
          if [[ "${{ gitea.ref }}" == refs/tags/v* ]]; then
            # Strip leading 'v' from tag → e.g. v1.2.3 → 1.2.3
            VERSION="${{ gitea.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Format: YYYY.MMDD.HHMM — always increasing, fits Chrome Web Store constraints
            VERSION="$(date -u +'%Y.%-m%d.%-H%M')"
          fi
          ARTIFACT_NAME="chainlink-extension-${VERSION}"
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITEA_OUTPUT
          echo "Extension version: $VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Stamp version in manifest
        working-directory: frontend/extension-public
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' manifest.json
          echo "Manifest version:"
          grep '"version"' manifest.json

      - name: Build extension
        working-directory: frontend
        run: npm run build:extension

      - name: Lint extension
        working-directory: frontend
        run: npx web-ext lint --source-dir dist-extension

      - name: Package extension
        working-directory: frontend
        run: npx web-ext build --source-dir dist-extension --artifacts-dir . --overwrite-dest --filename chainlink-extension.zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v3
        with:
          name: chainlink-extension-${{ steps.version.outputs.VERSION }}
          path: frontend/chainlink-extension.zip

  deploy:
    needs: [build, build-frontend]
    if: gitea.event_name == 'push' && gitea.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Checkout docker-compose-config
        uses: actions/checkout@v5
        with:
          repository: mh03r932/docker-compose-config
          token: ${{ secrets.DOCKER_COMPOSE_TOKEN_GITHUB }}
          path: docker-compose-config
          github-server-url: https://github.com

      - name: Print commit hash
        run: echo "Deploying with commit hash ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Update image tags in docker-compose.yml
        working-directory: docker-compose-config/chainlink
        run: |
          COMMIT_HASH="${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          echo "COMMIT_HASH variable value: $COMMIT_HASH"
          echo "Current docker-compose.yml content (before sed):"
          cat docker-compose.yml
          sed -i "s|chainlink-api:.*|chainlink-api:${COMMIT_HASH}|g" docker-compose.yml
          sed -i "s|chainlink-frontend:.*|chainlink-frontend:${COMMIT_HASH}|g" docker-compose.yml
          echo "docker-compose.yml content (after sed):"
          cat docker-compose.yml
          echo "Git diff showing changes:"
          git diff docker-compose.yml

      - name: Commit and push changes
        working-directory: docker-compose-config
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.gitea"
          git add chainlink/docker-compose.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(chainlink): update image tags to ${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          git push

  release:
    needs: [build-extension]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Create Gitea release
        uses: actions/forgejo-release@v2
        with:
          token: ${{ secrets.ESC_REPO_TOKEN }}
          direction: upload
          tag: ${{ gitea.ref_name }}
          title: ${{ gitea.ref_name }}
          release-dir: .
          override: false
          verbose: true
