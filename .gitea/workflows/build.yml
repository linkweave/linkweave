name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Determine version
        id: version
        env:
          GIT_REF: ${{ gitea.ref }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.COMMIT_HASH }}
        run: |
          set -euo pipefail
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            VERSION="${GIT_REF_NAME#v}"
          else
            VERSION="$COMMIT_HASH"
          fi
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "Version: $VERSION"

      - id: java-setup
        name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      # Runs the full test suite with JaCoCo coverage (quarkus-jacoco extension +
      # jacoco-maven-plugin). 'package' already executes every test class — they
      # all match surefire's *Test pattern — and writes target/jacoco-quarkus.exec
      # plus the HTML/XML report under target/jacoco-report/.
      - name: Build & test with coverage
        working-directory: api
        run: ./mvnw package --batch-mode --no-transfer-progress

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: api/target/jacoco-report/
          retention-days: 14

      # Quality gate: reads the exec data produced above (no rebuild) and fails
      # the build — and thus the Docker push/deploy below — on a coverage regression.
      - name: Coverage quality gate (≥ 70% line coverage)
        working-directory: api
        run: ./mvnw jacoco:check --batch-mode --no-transfer-progress

      - name: Upload Sentry source bundle
        if: gitea.ref == 'refs/heads/main' || startsWith(gitea.ref, 'refs/tags/v')
        working-directory: api
        run: ./mvnw sentry:uploadSourceBundle --batch-mode --no-transfer-progress -Psentry-upload
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Log in via the docker CLI (not docker/login-action) so auth goes through
      # the host daemon's /auth endpoint over IPv6, and to avoid the Node action
      # crashing under this runner.
      - name: Log in to Docker Registry
        env:
          REGISTRY: git.markushofstetter.com
          REGISTRY_USER: ${{ gitea.actor }}
          REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        run: |
          if [[ -z "$REGISTRY_TOKEN" ]]; then
            echo "DOCKER_REGISTRY_TOKEN secret is empty — cannot log in" >&2
            exit 1
          fi
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

      # Build + push on the host docker daemon (no docker-container buildx
      # builder): the host has IPv6 and reaches the registry via the AAAA
      # record, avoiding the IPv4-only netiter timeout. See ci-registry handoff.
      - name: Build and push API Docker image
        working-directory: .
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: git.markushofstetter.com/dividbzero/linkweave-api
          COMMIT_HASH: ${{ steps.commit-hash.outputs.COMMIT_HASH }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_REF: ${{ gitea.ref }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
        run: |
          set -euo pipefail
          tags=("${IMAGE}:latest" "${IMAGE}:${COMMIT_HASH}")
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            tags+=("${IMAGE}:${GIT_REF_NAME}")
          fi
          tag_args=()
          for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          docker build "${tag_args[@]}" \
            -f api/src/main/docker/Dockerfile.jvm \
            --build-arg COMMIT_HASH="${COMMIT_HASH}" \
            --build-arg VERSION="${VERSION}" \
            --label org.opencontainers.image.commit="${COMMIT_HASH}" \
            --label org.opencontainers.image.title="LinkWeave API" \
            --label org.opencontainers.image.description="Quarkus-based Java backend for LinkWeave" \
            .
          for t in "${tags[@]}"; do docker push "$t"; done

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: frontend
        run: pnpm test

  build-frontend:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "Hash sliced (first 7 chars): ${hash::7}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Get version
        id: version
        env:
          GIT_REF: ${{ gitea.ref }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
          COMMIT_HASH: ${{ steps.commit-hash.outputs.COMMIT_HASH }}
        run: |
          set -euo pipefail
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            VERSION="${GIT_REF_NAME#v}"
          else
            VERSION="$COMMIT_HASH"
          fi
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "Version: $VERSION"

      - name: Print commit hash
        run: |
          echo "Commit hash output: ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      # Log in via the docker CLI (not docker/login-action) so auth goes through
      # the host daemon's /auth endpoint over IPv6, and to avoid the Node action
      # crashing under this runner.
      - name: Log in to Docker Registry
        env:
          REGISTRY: git.markushofstetter.com
          REGISTRY_USER: ${{ gitea.actor }}
          REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        run: |
          if [[ -z "$REGISTRY_TOKEN" ]]; then
            echo "DOCKER_REGISTRY_TOKEN secret is empty — cannot log in" >&2
            exit 1
          fi
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

      # Build + push on the host docker daemon (no docker-container buildx
      # builder): the host has IPv6 and reaches the registry via the AAAA
      # record, avoiding the IPv4-only netiter timeout. See ci-registry handoff.
      - name: Build and push frontend Docker image
        working-directory: frontend
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: git.markushofstetter.com/dividbzero/linkweave-frontend
          COMMIT_HASH: ${{ steps.commit-hash.outputs.COMMIT_HASH }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GIT_REF: ${{ gitea.ref }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
        run: |
          set -euo pipefail
          tags=("${IMAGE}:latest" "${IMAGE}:${COMMIT_HASH}")
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            tags+=("${IMAGE}:${GIT_REF_NAME}")
          fi
          tag_args=()
          for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          docker build "${tag_args[@]}" \
            --build-arg COMMIT_HASH="${COMMIT_HASH}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg VITE_SENTRY_DSN="https://dd086e579810c04e75f2e37463ac7378@o4509425614520320.ingest.de.sentry.io/4511463699120208" \
            --secret id=sentry_auth_token,env=sentry_auth_token \
            --label org.opencontainers.image.commit="${COMMIT_HASH}" \
            --label org.opencontainers.image.title="LinkWeave Frontend" \
            --label org.opencontainers.image.description="Vue.js frontend for LinkWeave" \
            .
          for t in "${tags[@]}"; do docker push "$t"; done

  build-screenshot-sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      # Log in via the docker CLI (not docker/login-action) so auth goes through
      # the host daemon's /auth endpoint over IPv6, and to avoid the Node action
      # crashing under this runner.
      - name: Log in to Docker Registry
        env:
          REGISTRY: git.markushofstetter.com
          REGISTRY_USER: ${{ gitea.actor }}
          REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        run: |
          if [[ -z "$REGISTRY_TOKEN" ]]; then
            echo "DOCKER_REGISTRY_TOKEN secret is empty — cannot log in" >&2
            exit 1
          fi
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

      # Build + push on the host docker daemon (no docker-container buildx
      # builder): the host has IPv6 and reaches the registry via the AAAA
      # record, avoiding the IPv4-only netiter timeout. The type=gha cache was
      # dropped because it requires the docker-container driver. See handoff.
      - name: Build and push screenshot service image
        working-directory: screenshot-service
        env:
          DOCKER_BUILDKIT: "1"
          IMAGE: git.markushofstetter.com/dividbzero/linkweave-screenshot-service
          COMMIT_HASH: ${{ steps.commit-hash.outputs.COMMIT_HASH }}
        run: |
          set -euo pipefail
          docker build \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${COMMIT_HASH}" \
            --label org.opencontainers.image.commit="${COMMIT_HASH}" \
            --label org.opencontainers.image.title="LinkWeave Screenshot Service" \
            --label org.opencontainers.image.description="Playwright-based screenshot sidecar for LinkWeave" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${COMMIT_HASH}"

  build-extension:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.version.outputs.ARTIFACT_NAME }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate version
        id: version
        env:
          GIT_REF: ${{ gitea.ref }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            # Strip leading 'v' from tag → e.g. v1.2.3 → 1.2.3
            VERSION="${GIT_REF_NAME#v}"
          else
            # Format: YYYY.MMDD.HHMM as three integers — always increasing, fits
            # Chrome Web Store constraints. Each component is normalized to a
            # base-10 integer (10#…) so it never carries a leading zero, which
            # AMO/web-ext rejects (e.g. the 00:xx UTC hour would yield "0MM").
            read -r Y MD HM <<< "$(date -u +'%Y %m%d %H%M')"
            VERSION="${Y}.$((10#$MD)).$((10#$HM))"
          fi
          ARTIFACT_NAME="linkweave-extension-${VERSION}"
          echo "VERSION=$VERSION" >> $GITEA_OUTPUT
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITEA_OUTPUT
          echo "Extension version: $VERSION"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Stamp version in manifest
        working-directory: frontend/extension-public
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' manifest.json
          echo "Manifest version:"
          grep '"version"' manifest.json

      - name: Build extension
        working-directory: frontend
        run: pnpm run build:extension

      - name: Lint extension
        working-directory: frontend
        run: pnpm exec web-ext lint --source-dir dist-extension

      - name: Package extension
        working-directory: frontend
        run: pnpm exec web-ext build --source-dir dist-extension --artifacts-dir . --overwrite-dest --filename linkweave-extension.zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v3
        with:
          name: linkweave-extension-${{ steps.version.outputs.VERSION }}
          path: frontend/linkweave-extension.zip

  deploy:
    needs: [build, build-frontend, build-screenshot-sidecar]
    if: gitea.event_name == 'push' && (gitea.ref == 'refs/heads/main' || startsWith(gitea.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Checkout docker-compose-config
        uses: actions/checkout@v5
        with:
          repository: mh03r932/docker-compose-config
          token: ${{ secrets.DOCKER_COMPOSE_TOKEN_GITHUB }}
          path: docker-compose-config
          github-server-url: https://github.com

      - name: Print commit hash
        run: echo "Deploying with commit hash ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Update image tags in docker-compose.yml
        working-directory: docker-compose-config/chainlink
        run: |
          COMMIT_HASH="${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          echo "COMMIT_HASH variable value: $COMMIT_HASH"
          echo "Current docker-compose.yml content (before sed):"
          cat docker-compose.yml
          sed -i "s|linkweave-api:.*|linkweave-api:${COMMIT_HASH}|g" docker-compose.yml
          sed -i "s|linkweave-frontend:.*|linkweave-frontend:${COMMIT_HASH}|g" docker-compose.yml
          sed -i "s|linkweave-screenshot-service:.*|linkweave-screenshot-service:${COMMIT_HASH}|g" docker-compose.yml
          # Fail loud if the sed matched nothing (e.g. the external compose still uses the old
          # chainlink-* image names) — otherwise prod silently keeps the previous tag forever.
          for img in linkweave-api linkweave-frontend linkweave-screenshot-service; do
            grep -q "${img}:${COMMIT_HASH}" docker-compose.yml || {
              echo "ERROR: ${img}:${COMMIT_HASH} not found after sed — does the compose still reference old chainlink-* image names?" >&2
              exit 1
            }
          done
          echo "docker-compose.yml content (after sed):"
          cat docker-compose.yml
          echo "Git diff showing changes:"
          git diff docker-compose.yml

      - name: Commit and push changes
        working-directory: docker-compose-config
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@users.noreply.gitea"
          git add chainlink/docker-compose.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): update image tags to ${{ steps.commit-hash.outputs.COMMIT_HASH }}"
          git push

  release:
    needs: [build-extension]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GITEA_API: ${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Create Gitea release and upload asset
        env:
          GITEA_TOKEN: ${{ secrets.ESC_REPO_TOKEN }}
          GIT_REF_NAME: ${{ gitea.ref_name }}
        run: |
          set -x
          TAG="${GIT_REF_NAME}"
          RESPONSE=$(curl -sf -w "\nHTTP_CODE:%{http_code}" -X POST \
            "${GITEA_API}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Release ${TAG}\"}" 2>/dev/null) || true
          HTTP_CODE=$(echo "$RESPONSE" | grep 'HTTP_CODE:' | cut -d: -f2)
          if [ "$HTTP_CODE" = "409" ] || [ "$HTTP_CODE" = "422" ]; then
            echo "Release already exists, fetching ID..."
            RELEASE_ID=$(curl -sf "${GITEA_API}/releases/tags/${TAG}" \
              -H "Authorization: token ${GITEA_TOKEN}" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          else
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to get/create release. Last response:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          curl -sf -w "\nHTTP_CODE:%{http_code}" -X POST \
            "${GITEA_API}/releases/${RELEASE_ID}/assets" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "name=linkweave-extension-${TAG}.zip" \
            -F "attachment=@linkweave-extension.zip"

  publish-chrome:
    needs: [build-extension, release]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Publish to Chrome Web Store
        run: npx chrome-webstore-upload-cli@3 upload --source linkweave-extension.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_EXTENSION_GWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_EXTENSION_GWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_EXTENSION_GWS_REFRESH_TOKEN }}

  publish-firefox:
    needs: [build-extension, release]
    if: startsWith(gitea.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v3
        with:
          name: ${{ needs.build-extension.outputs.artifact-name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Unzip extension for Firefox
        run: |
          mkdir -p extension-src
          unzip linkweave-extension.zip -d extension-src

      - name: Publish to Firefox Add-ons
        run: npx web-ext sign --channel=listed --source-dir extension-src
        env:
          WEB_EXT_API_KEY: ${{ secrets.FIREFOX_AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.FIREFOX_AMO_API_SECRET }}
