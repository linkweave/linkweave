name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - id: java-setup
        name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: api
        run: ./mvnw package -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-api:latest
            git.markushofstetter.com/dividbzero/chainlink-api:${{ steps.commit-hash.outputs.COMMIT_HASH }}
          file: api/src/main/docker/Dockerfile.jvm
          build-args: COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink API
            org.opencontainers.image.description=Quarkus-based Java backend for Chainlink

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get commit hash
        id: commit-hash
        run: |
          hash="${{ gitea.sha }}"
          echo "COMMIT_HASH=${hash::7}" >> $GITEA_OUTPUT

      - name: Print commit hash
        run: |
          echo "Commit hash output: ${{ steps.commit-hash.outputs.COMMIT_HASH }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: git.markushofstetter.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            git.markushofstetter.com/dividbzero/chainlink-frontend:latest
            git.markushofstetter.com/dividbzero/chainlink-frontend:${{ steps.commit-hash.outputs.COMMIT_HASH }}
          file: frontend/Dockerfile
          build-args: COMMIT_HASH=${{ steps.commit-hash.outputs.COMMIT_HASH }}
          labels: |
            org.opencontainers.image.commit=${{ steps.commit-hash.outputs.COMMIT_HASH }}
            org.opencontainers.image.title=Chainlink Frontend
            org.opencontainers.image.description=Vue.js frontend for Chainlink
