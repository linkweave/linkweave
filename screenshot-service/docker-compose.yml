services:
  screenshot-service:
    build: .
    image: linkweave-screenshot-service:dev
    init: true
    # Chromium is memory-hungry; cap so a runaway can't OOM the host.
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    # Local dev: bind to loopback only so quarkus:dev (running on the host)
    # can reach the sidecar at http://localhost:3000. For production, drop
    # this `ports:` block and put both the API and sidecar on the same
    # internal compose network — the sidecar should not be reachable from
    # outside the host.
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - linkweave-internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  linkweave-internal:
