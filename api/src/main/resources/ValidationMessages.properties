# App-specific bean-validation messages (overrides keyed by constraint message
# templates). Standard jakarta constraint messages (NotBlank, Size, ...) are
# provided per-locale by Hibernate Validator's own bundled translations.
#
# NOTE: a ValidationMessages_<lang>.properties file must exist for every locale
# in quarkus.locales (de, fr, it, en). Hibernate Validator only pre-initialises
# the locales it finds a bundle for; a request resolving to a locale without one
# fails with HV000250. See application.properties / AppLanguages.
linkweave.validation.apiKeyExpiresIn=Must be one of: 30d, 90d, 1y, never
