quarkus.application.name=linkweave-api
# separating root-path and non-application-root-path
# allows for making the api public but keeping /q stuff private
quarkus.http.root-path=/api
quarkus.http.non-application-root-path=/q
# Keep in Sync with Enum "AppLanguage"
quarkus.locales=de-CH,fr-CH,it-CH,en-US
# Must be a locale Hibernate Validator pre-initializes — i.e. one that has a
# ValidationMessages_<lang>.properties bundle (we ship en/de/fr/it). A request
# resolving to a locale without a bundle throws HV000250 on every @NotBlank/@Size
# violation. Only applies to requests without an Accept-Language header; the app's
# user-facing default language is also AppLanguages.DEFAULT (=EN), and per request
# the in-app locale is honoured via Accept-Language.
quarkus.default-locale=en-US

### api
%dev.app.deployment.environment=LOCAL
%test.app.deployment.environment=UNIT_TEST
%prod.app.deployment.environment=${LINKWEAVE_API_DEPLOYMENT_ENVIRONMENT}
app.deployment.public-url=${LINKWEAVE_API_DEPLOYMENT_PUBLIC_URL}
%test.app.deployment.public-url=https://local-linkweave.localhost:4443/
app.deployment.version=${APP_VERSION:${quarkus.application.version}}
app.deployment.app-project=linkweave
app.deployment.app-module=api
app.deployment.instance=${LINKWEAVE_API_DEPLOYMENT_INSTANCE:${HOSTNAME}}
%dev.app.deployment.instance=dev-${USERNAME:${USER:${USER_FALLBACK}}}
%test.app.deployment.instance=unit-test-${USERNAME:${USER:${USER_FALLBACK:QUARKUSTEST}}}

%dev.quarkus.hibernate-orm.log.sql=false
%test.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.hibernate-orm.scripts.generation=create
%dev.quarkus.hibernate-orm.scripts.generation.create-target=src/main/resources/db/test-migration/V1.0.0__test-init.sql
#%test.quarkus.log.min-level=TRACE
#%test.quarkus.hibernate-orm.log.bind-parameters=true

### HTTP
%dev.quarkus.http.host=localhost
%test.quarkus.http.host=localhost
%dev.quarkus.http.ssl.certificate.files=../developer-local-settings/config/certs/multi-domain.pem
%dev.quarkus.http.ssl.certificate.key-files=../developer-local-settings/config/certs/multi-domain.key
%dev.quarkus.http.insecure-requests=disabled
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains; preload
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.limits.max-body-size=20M

# DEV UI
%dev.quarkus.dev-ui.hosts=local-linkweave.localhost,localhost
%dev.quarkus.dev-ui.cors.enabled=false

# DATABASE
quarkus.datasource.db-kind=sqlite
# NOTE: never add transaction_mode=IMMEDIATE here — sqlite-jdbc issues BEGIN IMMEDIATE eagerly
# when Agroal disables autocommit, so idle pooled connections hold the write lock and every other
# connection stalls for the full busy_timeout (measured in SqliteWriteContentionLoadITest, UC-095).
quarkus.datasource.jdbc.url=jdbc:sqlite:${LINKWEAVE_DB_PATH:../developer-local-settings/linkweave.db}?foreign_keys=on&busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:linkweave-test.db?foreign_keys=on&busy_timeout=10000&journal_mode=WAL&synchronous=NORMAL


# FLYWAY
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
%test.quarkus.flyway.clean-disabled=false

# JACKSON
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=false



### SECURITY

## OIDC (Google) - active for dev and prod
# Redirect URI for Google Console: {public-url}api/auth/oidc-login
quarkus.oidc.auth-server-url=https://accounts.google.com
quarkus.oidc.client-id=838049690608-usqf9c42iau16bneim1ckcj1q4v74bou.apps.googleusercontent.com
quarkus.oidc.credentials.secret=${LINKWEAVE_OIDC_CLIENT_SECRET}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.scopes=openid,profile,email
quarkus.oidc.token.principal-claim=email
%dev.quarkus.oidc.authentication.cookie-domain=dev-linkweave.dev
%prod.quarkus.oidc.authentication.cookie-domain=linkweave.dev


# Disable OIDC for test (use form auth instead)
%test.quarkus.oidc.enabled=false

## Return 499 instead of 302 if ajax request is detected and login is invalid.
## Detection: requests carrying `X-Requested-With: XMLHttpRequest` (the SPA sets
## this in api/client.ts). Combined with proactive=false below, this keeps the
## @PermitAll /api/ping probe and Google OIDC top-level login flow working,
## while protected XHR calls get 499 instead of a cross-origin 302 to Google.
quarkus.oidc.authentication.java-script-auto-redirect=false
quarkus.http.auth.proactive=false

## Form-based auth - active for test only
#quarkus.http.auth.form.enabled=false
#%test.quarkus.http.auth.form.enabled=true
#%test.quarkus.http.auth.form.login-page=
#%test.quarkus.http.auth.form.landing-page=
#%test.quarkus.http.auth.form.error-page=
#%test.quarkus.http.auth.form.http-only-cookie=true
#%test.quarkus.http.auth.session.encryption-key=linkweave-form-auth-encryption-key
# todo remove this later
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=
quarkus.http.auth.form.landing-page=
quarkus.http.auth.form.error-page=
quarkus.http.auth.form.http-only-cookie=true
quarkus.http.auth.form.cookie-name=linkweave-credential
quarkus.http.auth.session.encryption-key=${LINKWEAVE_FORM_LOGIN_COOKIE_SECRET}
%test.quarkus.http.auth.session.encryption-key=${LINKWEAVE_FORM_LOGIN_COOKIE_SECRET:mySecretKeyForT3sting}

## Desktop build profile (UC-052) — only active when packaged AND run with quarkus.profile=desktop.
## Inert for the default/prod (Docker + Caddy) build, which is unchanged. The desktop build is a
## separate artifact anyway (OIDC must be compiled out so the backend never reaches Google at
## startup), so it is free to flip routing: serve the SPA at / (no Caddy in the bundle) while the
## REST API stays under /api. Form login (the only desktop auth path) is pinned back to /api.
## The SPA itself is served by DesktopWebRootRoute from the runtime LINKWEAVE_DESKTOP_WEB_ROOT dir.
%desktop.quarkus.http.root-path=/
%desktop.quarkus.rest.path=/api
%desktop.quarkus.oidc.enabled=false
%desktop.quarkus.http.auth.form.post-location=/api/j_security_check
# The desktop bundle is self-contained and offline-capable, so the prod-only required config
# (Sentry DSN, deployment env/url, form-auth secret) is given local defaults here instead of env
# vars. The session key is a fixed local value: acceptable for a single-user, loopback-only app.
%desktop.quarkus.log.sentry.enabled=false
%desktop.app.deployment.environment=LOCAL
%desktop.app.deployment.public-url=http://127.0.0.1/
%desktop.app.deployment.instance=desktop
%desktop.quarkus.http.auth.session.encryption-key=linkweave-desktop-local-session-key


## SameSite=None for browser extension support
# Extension popups make cross-site fetch() requests (origin: chrome-extension://).
# SameSite=Lax (the browser default) silently drops cookies on cross-site requests,
# causing every API call from the extension to return 401.
# SameSite=None;Secure allows the session cookies to be sent cross-site.
# The cookies remain HttpOnly and Secure — no security regression.
%dev.quarkus.http.same-site-cookie."q_session".value=None
%dev.quarkus.http.same-site-cookie."linkweave-credential".value=None
%prod.quarkus.http.same-site-cookie."q_session".value=None
%prod.quarkus.http.same-site-cookie."linkweave-credential".value=None

## Proxy
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true



quarkus.log.category."io.quarkus.oidc.client.runtime.OidcClientRecorder".level=TRACE
quarkus.log.category."io.quarkus.oidc.client.runtime.OidcClientRecorder".min-level=TRACE
quarkus.log.category."io.quarkus.oidc.client.runtime.OidcClientImpl".level=TRACE
quarkus.log.category."io.quarkus.oidc.client.runtime.OidcClientImpl".min-level=TRACE

# Auto-tagging: DEBUG logs the exact request/response to the LLM (prompt,
# vocabulary enum, model output). Enabled for debugging; drop to INFO to silence.
quarkus.log.category."org.linkweave.api.autotag.llm".level=INFO

# Disable rate limiting in test
%test.quarkus.fault-tolerance."org.linkweave.api.auth.AuthResource/register".rate-limit.value=1000
%test.quarkus.fault-tolerance."org.linkweave.api.auth.apikey.ApiKeyResource/create".rate-limit.value=1000
# Relax rate limiting in dev so per-spec e2e users can register concurrently
# without bumping into the production 5/min cap.
%dev.quarkus.fault-tolerance."org.linkweave.api.auth.AuthResource/register".rate-limit.value=1000

# Disable scheduled favicon cache cleanup in tests; tests invoke the job directly.
%test.linkweave.favicon.cache-cleanup.enabled=false

# Global fetch skip list: hostnames (or *.wildcards) the backend must never
# fetch favicons or screenshots for — domains the server cannot reach (internal
# CDNs) or should not hammer (rate-limiting hosts). Comma- or newline-separated.
# Unset by default. Example:
# linkweave.fetch.skip-domains=*.internal.corp,assets.flaky-host.com

# Negative-cache backoff ceilings. Each consecutive fetch failure for a host
# doubles its negative TTL from negative-ttl up to negative-ttl-max, so a
# permanently-broken host stops being re-fetched every short window. Defaults
# (favicon 6H→30D, screenshot 12H→30D) are set in ConfigService.
# linkweave.favicon.negative-ttl-max=30D
# linkweave.screenshot.negative-ttl-max=30D

# Screenshot sidecar URL — referenced by the REST Client config below so the
# operator-facing key stays grouped with the rest of linkweave.screenshot.*.
linkweave.screenshot.service-url=http://localhost:3000

# Quarkus REST Client wiring for the sidecar. connect-timeout fails fast on an
# unreachable sidecar; read-timeout covers the sidecar's full worst-case
# capture budget (~10s nav + 4s networkidle settle + 0.8s post-load paint
# settle + screenshot) with headroom so the sidecar always wins the race and
# returns a clean error rather than getting cut off mid-response. Keep this in
# sync with the settle constants in screenshot-service/server.js.
quarkus.rest-client.screenshot-sidecar.url=${linkweave.screenshot.service-url}
quarkus.rest-client.screenshot-sidecar.connect-timeout=3000
quarkus.rest-client.screenshot-sidecar.read-timeout=20000

# Screenshot sidecar is not launched in tests; flagging off keeps the capture
# job a no-op. The cache cleanup is also skipped — tests invoke it directly.
%test.linkweave.screenshot.enabled=false
%test.linkweave.screenshot.cache-cleanup.enabled=false
%test.linkweave.screenshot.capture-job.enabled=false
# Isolated cache dir so tests can't tamper with the dev cache under
# developer-local-settings/. Tests that exercise the cache clean their own
# entries; the directory itself is created on demand.
%test.linkweave.screenshot.cache-dir=target/test-screenshot-cache


linkweave.feature.bookmark-properties.enabled=true

# LLM auto-tagging (FR-095 / FR-096). Master switch; when off, no model calls
# are made and the system falls back to client-side rule suggestions.
linkweave.autotag.llm.enabled=true
# Provider (FR-097): "ollama" (local, default) or "openai" (hosted OpenAI-
# compatible API such as z.ai). NOTE: a hosted provider sends bookmark text off
# the host — only "ollama" keeps processing local (see UC-097 BR-080).
linkweave.autotag.provider=ollama
# Cap on the vocabulary sent to the model; 0 = no cap.
linkweave.autotag.max-vocab=0

# --- Ollama (provider = ollama) ---
linkweave.autotag.model=gemma2:2b
# Ollama keep_alive idle window (0 = unload each call, -1 = always resident).
linkweave.autotag.keep-alive=15m
# Ollama service URL — referenced by the REST Client config below.
linkweave.autotag.service-url=http://localhost:11434
# connect-timeout fails fast on an unreachable server; read-timeout must cover a
# cold-start model load (~2-4s for 2B) plus inference, with headroom.
quarkus.rest-client.ollama.url=${linkweave.autotag.service-url}
quarkus.rest-client.ollama.connect-timeout=3000
quarkus.rest-client.ollama.read-timeout=30000
# Separate client for the on-demand model pull (first warm-up/request). The stock
# Ollama image ships no model, so the first pull downloads them (gemma2:2b is
# ~1.6 GB) — give it a long read-timeout; subsequent pulls are cached no-ops.
quarkus.rest-client.ollama-pull.url=${linkweave.autotag.service-url}
quarkus.rest-client.ollama-pull.connect-timeout=3000
quarkus.rest-client.ollama-pull.read-timeout=1800000

# --- OpenAI-compatible hosted provider (provider = openai), e.g. z.ai GLM ---
linkweave.autotag.openai.model=glm-4.6
# Secret: set via env, never commit. Empty unless an operator opts in.
linkweave.autotag.openai.api-key=${LINKWEAVE_AUTOTAG_API_KEY:}
# Base URL (default points at z.ai's OpenAI-compatible endpoint).
linkweave.autotag.openai.base-url=https://api.z.ai/api/paas/v4
quarkus.rest-client.openai-autotag.url=${linkweave.autotag.openai.base-url}
quarkus.rest-client.openai-autotag.connect-timeout=3000
quarkus.rest-client.openai-autotag.read-timeout=30000

# Note: in tests the real clients are never reached — a fake LlmTaggingClient is
# installed via QuarkusMock — so the master switch is left at its default and
# the disabled-path test opts out via a QuarkusTestProfile.

# SENTRY
linkweave.sentry.frontend-project-id=${SENTRY_FRONTEND_PROJECT_ID:4511463699120208}
quarkus.log.sentry.enabled=true
quarkus.log.sentry.dsn=${SENTRY_DSN:}
quarkus.log.sentry.level=WARN
quarkus.log.sentry.minimum-event-level=WARN
quarkus.log.sentry.minimum-breadcrumb-level=INFO
quarkus.log.sentry.in-app-packages=org.linkweave
quarkus.log.sentry.environment=${app.deployment.environment}
quarkus.log.sentry.release=${app.deployment.version}
quarkus.log.sentry.traces-sample-rate=0.2
%dev.quarkus.log.sentry.traces-sample-rate=1.0
# Disable Sentry in tests to avoid noise
%test.quarkus.log.sentry.enabled=false

# METRICS
quarkus.datasource.jdbc.metrics.enabled=true
linkweave.metrics.refresh.enabled=true

# Disable metrics refresh scheduler in tests; tests invoke refreshMetrics() directly.
%test.linkweave.metrics.refresh.enabled=false
# Disable fault-tolerance metrics — SmallRye FT 6.x has conflicting tag schemas for
# ft_ratelimit_calls_total that cause IllegalArgumentException with the Prometheus registry.
quarkus.fault-tolerance.metrics.enabled=false

### JaCoCo — exclude generated code from coverage report
# quarkus-jacoco extension report excludes (same patterns as jacoco-maven-plugin <excludes> in pom.xml)
quarkus.jacoco.excludes=org/linkweave/**/Q*.class,org/linkweave/**/*_.class,org/linkweave/**/_*.class
